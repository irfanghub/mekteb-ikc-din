/* ── HEALTH SCORE ── */
function berekenHealth(leerlingen){
  if(!leerlingen.length)return 0;
  const gemAanw=leerlingen.reduce((s,l)=>s+apct(l.aanwezigheid),0)/leerlingen.length;
  const gemVaard=leerlingen.reduce((s,l)=>s+telObj(l.vaardigheden)/VAARD.length*100,0)/leerlingen.length;
  const gemSuras=leerlingen.reduce((s,l)=>s+telObj(l.suras)/SURAS.length*100,0)/leerlingen.length;
  const gemIlm=leerlingen.reduce((s,l)=>s+telObj(l.ilmihal)/TOTAL_ILM*100,0)/leerlingen.length;
  return Math.round(gemAanw*0.35+gemVaard*0.2+gemSuras*0.2+gemIlm*0.25);
}

function healthKleur(score){
  if(score>=80)return '#1a5c2e';
  if(score>=60)return '#c8932a';
  if(score>=40)return '#e65100';
  return '#c62828';
}

function healthLabel(score){
  if(score>=80)return'Uitstekend 🌟';
  if(score>=60)return'Goed 👍';
  if(score>=40)return'Matig ⚠️';
  return'Aandacht nodig ❗';
}

              <div style={{fontSize:13,fontWeight:700,color:t1}}>{bs?r.bs:r.nl}</div>
              <div style={{fontSize:10,color:tm,marginTop:1}}>{r.sub}</div>
            </div>
          ))}
        </div>
        <div style={C({background:okbg,border:`1px solid ${okbo}`,display:'flex',alignItems:'center',gap:12,padding:14})}>
          <span style={{fontSize:22}}>📚</span>
          <div><div style={{fontWeight:700,fontSize:13,color:PR}}>{TOTAL_ILM} ilmihal lessen · {leerlingen.length} leerlingen</div>
          <div style={{fontSize:11,color:t2}}>{berekenHealth(leerlingen)}% mekteb gezondheid · {healthLabel(berekenHealth(leerlingen))}</div></div>
        </div>
        <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:10}}>
          {['nl','bs'].map(l=>(<button key={l} onClick={()=>slaT(l)} style={{padding:'7px 16px',borderRadius:20,border:`1.5px solid ${taal===l?PR:bo}`,background:taal===l?PR:'transparent',color:taal===l?'#fff':t2,fontSize:13,fontWeight:600,cursor:'pointer'}}>{l==='nl'?'🇳🇱 NL':'🇧🇦 BS'}</button>))}
          <button onClick={()=>slaD(!donker)} style={{padding:'7px 14px',borderRadius:20,border:`1.5px solid ${bo}`,background:'transparent',color:t2,fontSize:14,cursor:'pointer'}}>{donker?'☀️':'🌙'}</button>
        </div>
      </div>
      {bericht&&<div style={TS}>{bericht}</div>}
    </div>
  );

  /* ══════════════════════════════════════════
     LOGIN SCREENS
  ══════════════════════════════════════════ */
  if(scherm==='ef-login'||scherm==='bestuur-login'){
    const isB=scherm==='bestuur-login';
    return(
      <div style={{background:bg,minHeight:'100vh'}}>
        <div style={HD}><button style={BB} onClick={()=>setScherm('welkom')}>← {bs?'Nazad':'Terug'}</button>
          <div style={{fontSize:20,fontWeight:700,color:'#fff'}}>{isB?'Bestuur Login':'Efendija Login'}</div>
        </div>
        <div style={{padding:'24px 16px'}}>
          <div style={C()}>
            <span style={L()}>{bs?'Pristupni kod':'Toegangscode'}</span>
            <input style={{...IN(),letterSpacing:6,textAlign:'center',fontSize:22}} type="password" placeholder="••••••••" value={code}
              onChange={e=>{setCode(e.target.value);setCErr(false);}} onKeyDown={e=>e.key==='Enter'&&(isB?loginB():loginEf())}/>
            {codeErr&&<p style={{color:ERR,fontSize:13,textAlign:'center',margin:'0 0 8px'}}>{bs?'Pogrešan kod':'Onjuiste code'}</p>}
            <button style={BT()} onClick={isB?loginB:loginEf}>{bs?'Prijava':'Inloggen'}</button>
          </div>
          <p style={{fontSize:11,color:tm,textAlign:'center',marginTop:8}}>
            {isB?'Bestuur code: BESTUUR2026':'Code: DIN2026'}
          </p>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════
     BESTUUR DASHBOARD
  ══════════════════════════════════════════ */
  if(scherm==='bestuur'){
    const health=berekenHealth(leerlingen);
    const hKleur=healthKleur(health);
    const gemAanw=leerlingen.length?Math.round(leerlingen.reduce((s,l)=>s+apct(l.aanwezigheid),0)/leerlingen.length):0;
    const gemVaard=leerlingen.length?Math.round(leerlingen.reduce((s,l)=>s+telObj(l.vaardigheden)/VAARD.length*100,0)/leerlingen.length):0;
    const gemSuras=leerlingen.length?Math.round(leerlingen.reduce((s,l)=>s+telObj(l.suras)/SURAS.length*100,0)/leerlingen.length):0;
    const gemIlm=leerlingen.length?Math.round(leerlingen.reduce((s,l)=>s+telObj(l.ilmihal)/TOTAL_ILM*100,0)/leerlingen.length):0;
    const aanwProbleem=leerlingen.filter(l=>l.aanwezigheid.filter(a=>!a.aanwezig).length>=3);
    const topPunten=[...leerlingen].sort((a,b)=>b.punten-a.punten).slice(0,5);
    const totPunten=leerlingen.reduce((s,l)=>s+l.punten,0);
    const vandaagAanw=leerlingen.filter(l=>l.aanwezigheid.find(a=>a.datum===dag())?.aanwezig).length;
    const niveauStats=NIVEAUS.map(n=>({...n,cnt:leerlingen.filter(l=>l.niveau===n.id).length,gemA:leerlingen.filter(l=>l.niveau===n.id).length?Math.round(leerlingen.filter(l=>l.niveau===n.id).reduce((s,l)=>s+apct(l.aanwezigheid),0)/leerlingen.filter(l=>l.niveau===n.id).length):0}));

    // Ilmihal categorie voortgang
    const ilmCatStats=ILMIHAL.map(cat=>({
      ...cat,
      pct:leerlingen.length?Math.round(leerlingen.reduce((s,l)=>s+cat.lessen.filter(ls=>(l.ilmihal||{})[ls.id]).length/cat.lessen.length*100,0)/leerlingen.length):0
    }));

    // Aanwezigheid laatste 7 lessen
    const allDatums=[...new Set(leerlingen.flatMap(l=>l.aanwezigheid.map(a=>a.datum)))].sort((a,b)=>{
      const [da,ma,ya]=a.split('-').map(Number);const [db,mb,yb]=b.split('-').map(Number);
      return new Date(ya,ma-1,da)-new Date(yb,mb-1,db);
    }).slice(-7);

    const aanwPerDag=allDatums.map(d=>({
      datum:d,
      pct:leerlingen.length?Math.round(leerlingen.filter(l=>l.aanwezigheid.find(a=>a.datum===d)?.aanwezig).length/leerlingen.length*100):0,
      aanw:leerlingen.filter(l=>l.aanwezigheid.find(a=>a.datum===d)?.aanwezig).length,
      totaal:leerlingen.filter(l=>l.aanwezigheid.find(a=>a.datum===d)).length,
    }));

    const print=()=>{
      const w=window.open('','_blank');
      w.document.write(`<html><head><title>Mekteb Rapport IKC DIN</title>
      <style>body{font-family:system-ui;padding:30px;color:#1a2a1a}h1{color:#1a5c2e;margin-bottom:5px}h2{color:#1a5c2e;margin:20px 0 10px;font-size:15px}
      table{width:100%;border-collapse:collapse;margin:10px 0}th{background:#1a5c2e;color:white;padding:8px;text-align:left;font-size:12px}
      td{padding:7px 8px;border-bottom:1px solid #e0ede0;font-size:12px}.stat{display:inline-block;margin:8px 16px 8px 0}
      .stat-val{font-size:24px;font-weight:700;color:#1a5c2e}.stat-lbl{font-size:11px;color:#8aaa8a}</style></head><body>
      <h1>Mekteb Voortgang Rapport</h1>
      <p style="color:#8aaa8a;font-size:12px">IKC DIN Eindhoven · Gegenereerd op ${dag()}</p>
      <h2>📊 Overzicht</h2>
      <div class="stat"><div class="stat-val">${leerlingen.length}</div><div class="stat-lbl">Leerlingen</div></div>
      <div class="stat"><div class="stat-val">${health}%</div><div class="stat-lbl">Mekteb Gezondheid</div></div>
      <div class="stat"><div class="stat-val">${gemAanw}%</div><div class="stat-lbl">Gem. Aanwezigheid</div></div>
      <div class="stat"><div class="stat-val">${gemIlm}%</div><div class="stat-lbl">Gem. Ilmihal</div></div>
      <h2>👥 Alle Leerlingen</h2>
      <table><tr><th>Naam</th><th>Niveau</th><th>Aanwezigheid</th><th>Vaardigh.</th><th>Sura's</th><th>Ilmihal</th><th>Punten</th><th>Afwezigheid</th></tr>
      ${leerlingen.map(l=>`<tr><td>${l.naam}</td><td>Niv ${l.niveau}</td><td>${apct(l.aanwezigheid)}%</td><td>${Math.round(telObj(l.vaardigheden)/VAARD.length*100)}%</td><td>${Math.round(telObj(l.suras)/SURAS.length*100)}%</td><td>${Math.round(telObj(l.ilmihal)/TOTAL_ILM*100)}%</td><td>${l.punten}</td><td>${l.aanwezigheid.filter(a=>!a.aanwezig).length}x</td></tr>`).join('')}
      </table>
      ${aanwProbleem.length?`<h2>⚠️ Aandacht Nodig</h2><p>${aanwProbleem.map(l=>l.naam).join(', ')} — 3 of meer keer afwezig</p>`:''}
      <h2>🏆 Top Leerlingen</h2>
      ${topPunten.map((l,i)=>`<div style="padding:5px 0;border-bottom:1px solid #eee">${i+1}. ${l.naam} — ${l.punten} punten</div>`).join('')}
      <p style="margin-top:30px;color:#aaa;font-size:11px">IKC DIN Eindhoven · mekteb-ikc-din.vercel.app</p>
      </body></html>`);
      w.document.close();w.print();
    };

    const BTABS=[{id:'overzicht',icon:'📊',lbl:'Overzicht'},{id:'leerlingen',icon:'👥',lbl:'Leerlingen'},{id:'aanwezigheid',icon:'📋',lbl:'Aanwezigheid'},{id:'voortgang',icon:'📈',lbl:'Voortgang'}];

    return(
      <div style={{background:bg,minHeight:'100vh',paddingBottom:70}}>
        <div style={{background:'linear-gradient(135deg,#0d2a3d,#1a4a6e)',padding:'18px 20px 22px'}}>
          <button style={BB} onClick={()=>setScherm('welkom')}>← Uitloggen</button>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:20,fontWeight:700,color:'#fff'}}>📊 Bestuursdashboard</div>
              <div style={{fontSize:11,color:'rgba(255,255,255,.5)'}}>IKC DIN Eindhoven · {dag()}</div>
            </div>
            <button onClick={print} style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',color:'#fff',padding:'8px 14px',borderRadius:10,fontSize:12,fontWeight:600,cursor:'pointer'}}>🖨️ PDF</button>
          </div>
        </div>

        <div style={{display:'flex',overflowX:'auto',background:cbg,borderBottom:`1px solid ${bo}`}}>
          {BTABS.map(tb=>(<div key={tb.id} onClick={()=>setBTab(tb.id)} style={{flex:'0 0 auto',padding:'10px 16px',cursor:'pointer',borderBottom:`2.5px solid ${bTab===tb.id?INF:'transparent'}`,color:bTab===tb.id?INF:tm,fontWeight:bTab===tb.id?700:400,fontSize:12,whiteSpace:'nowrap'}}>{tb.icon} {tb.lbl}</div>))}
        </div>

        {/* ── TAB: OVERZICHT ── */}
        {bTab==='overzicht'&&<div style={{padding:'16px 0'}}>

          {/* HEALTH SCORE */}
          <div style={C({margin:'0 16px',background:donker?'#0a1a28':'#e8f4ff',border:`1px solid ${donker?'#1a3a5a':'#b8d4f5'}`})}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:donker?'#6aaaff':'#1565c0',letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>Mekteb Gezondheid</div>
                <div style={{fontSize:13,color:donker?'#8ab0d0':'#1565c0'}}>{healthLabel(health)}</div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:44,fontWeight:700,color:hKleur}}>{health}%</div>
              </div>
            </div>
            <div style={{background:donker?'#1a2a3a':'#c8dff5',borderRadius:8,height:12,overflow:'hidden'}}>
              <div style={{width:`${health}%`,height:'100%',background:hKleur,borderRadius:8}}/>
            </div>
            <div style={{fontSize:11,color:donker?'#5a8aaa':'#4a7aaa',marginTop:8}}>Gebaseerd op aanwezigheid (35%) + ilmihal (25%) + sura's (20%) + vaardigheden (20%)</div>
          </div>

          {/* STATS GRID */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,padding:'0 16px',marginBottom:2}}>
            {[
              {i:'👥',v:leerlingen.length,l:'Leerlingen',c:PR},
              {i:'📋',v:vandaagAanw,l:'Vandaag aanwezig',c:PR},
              {i:'⭐',v:totPunten,l:'Totaal punten',c:ACC},
              {i:'⚠️',v:aanwProbleem.length,l:'Aandacht nodig',c:aanwProbleem.length?ERR:PR},
            ].map(st=>(<div key={st.l} style={C({padding:'14px 12px',margin:0,textAlign:'center'})}>
              <div style={{fontSize:22}}>{st.i}</div>
              <div style={{fontSize:24,fontWeight:700,color:st.c,marginTop:4}}>{st.v}</div>
              <div style={{fontSize:10,color:tm,marginTop:1}}>{st.l}</div>
            </div>))}
          </div>

          {/* GEM VOORTGANG */}
          <div style={C({margin:'8px 16px'})}>
            <span style={L()}>Gemiddelde voortgang</span>
            {[['📋 Aanwezigheid',gemAanw,PR],['✅ Vaardigheden',gemVaard,ACC],["📖 Sura's",gemSuras,'#880e4f'],['📚 Ilmihal',gemIlm,INF]].map(([lb,val,col])=>(<div key={lb} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span style={{color:t1}}>{lb}</span><span style={{fontWeight:700,color:col}}>{val}%</span></div>
              <div style={BA({height:10,marginTop:4})}><div style={FI(val,col)}/></div>
            </div>))}
          </div>

          {/* NIVEAU VERDELING */}
          <div style={C({margin:'0 16px'})}>
            <span style={L()}>Verdeling per niveau</span>
            {niveauStats.map(n=>(<div key={n.id} style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
              <span style={{...BD(n.color,n.bg),minWidth:70,textAlign:'center',fontSize:10}}>{n.nl}</span>
              <div style={{flex:1}}>
                <div style={BA({height:12})}><div style={FI(leerlingen.length?n.cnt/leerlingen.length*100:0,n.color)}/></div>
              </div>
              <div style={{minWidth:60,textAlign:'right'}}>
                <span style={{fontSize:13,fontWeight:600,color:t1}}>{n.cnt} </span>
                <span style={{fontSize:11,color:tm}}>({n.gemA}% aanw.)</span>
              </div>
            </div>))}
          </div>

          {/* AANDACHT */}
          {aanwProbleem.length>0&&<div style={C({margin:'0 16px',background:donker?'#2a0a0a':'#fff3f3',border:`1px solid ${donker?'#5a2a2a':'#ffc0c0'}`})}>
            <span style={L({color:ERR})}>⚠️ Aandacht nodig — 3+ keer afwezig</span>
            {aanwProbleem.map(l=>(<div key={l.id} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`0.5px solid ${bo}`}}>
              <span style={{fontSize:14,fontWeight:600,color:t1}}>{l.naam}</span>
              <span style={{fontSize:12,color:ERR,fontWeight:600}}>{l.aanwezigheid.filter(a=>!a.aanwezig).length}x afwezig</span>
            </div>))}
          </div>}

          {/* TOP LEERLINGEN */}
          <div style={C({margin:'0 16px'})}>
            <span style={L()}>🏆 Top leerlingen</span>
            {topPunten.length===0&&<p style={{fontSize:13,color:tm,textAlign:'center'}}>Nog geen data</p>}
            {topPunten.map((l,i)=>(<div key={l.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:`0.5px solid ${bo}`}}>
              <div style={{width:28,height:28,borderRadius:'50%',background:[PR,'#c8932a','#7a5020','#555','#444'][i],display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:13,flexShrink:0}}>{i+1}</div>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:t1}}>{l.naam}</div><div style={{fontSize:11,color:tm}}>Niv {l.niveau} · {apct(l.aanwezigheid)}% aanwezig</div></div>
              <div style={{textAlign:'right'}}><div style={{fontSize:16,fontWeight:700,color:ACC}}>⭐{l.punten}</div></div>
            </div>))}
          </div>
        </div>}

        {/* ── TAB: LEERLINGEN ── */}
        {bTab==='leerlingen'&&<div style={{padding:'16px 0'}}>
          {leerlingen.length===0&&<div style={C({margin:'0 16px',textAlign:'center',padding:28})}><div style={{fontSize:32,marginBottom:8}}>🌱</div><p style={{margin:0,fontSize:14,color:tm}}>Nog geen leerlingen</p></div>}
          {[...leerlingen].sort((a,b)=>b.punten-a.punten).map((l,idx)=>{
            const ni=nivInfo(l.niveau);const ap=apct(l.aanwezigheid);
            const ip=Math.round(telObj(l.ilmihal)/TOTAL_ILM*100);
            const warn=l.aanwezigheid.filter(a=>!a.aanwezig).length>=3;
            return(<div key={l.id} style={C({margin:'0 16px 10px'})}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:36,height:36,borderRadius:'50%',background:okbg,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,color:PR,fontSize:15,flexShrink:0}}>{l.naam.charAt(0).toUpperCase()}</div>
                  <div>
                    <div style={{fontWeight:700,fontSize:14,color:t1}}>{idx+1}. {l.naam}{warn&&' ⚠️'}</div>
                    <div style={{fontSize:11,color:tm}}>{l.ouder||'—'}</div>
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <span style={BD(ni.color,ni.bg)}>{ni.nl}</span>
                  <div style={{fontSize:12,fontWeight:600,color:ACC,marginTop:4}}>⭐{l.punten}</div>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6}}>
                {[['📋',ap,PR],['✅',Math.round(telObj(l.vaardigheden)/VAARD.length*100),ACC],['📖',Math.round(telObj(l.suras)/SURAS.length*100),'#880e4f'],['📚',ip,INF]].map(([ic,val,col],i)=>(<div key={i} style={{textAlign:'center'}}>
                  <div style={{fontSize:14}}>{ic}</div>
                  <div style={{fontSize:14,fontWeight:700,color:col}}>{val}%</div>
                  <div style={BA({marginTop:3,height:5})}><div style={FI(val,col)}/></div>
                </div>))}
              </div>
            </div>);
          })}
        </div>}

        {/* ── TAB: AANWEZIGHEID ── */}
        {bTab==='aanwezigheid'&&<div style={{padding:'16px 0'}}>
          <div style={C({margin:'0 16px',background:okbg,border:`1px solid ${okbo}`})}>
            <div style={{fontWeight:700,fontSize:15,color:PR,marginBottom:4}}>📋 Vandaag — {dag()}</div>
            <div style={{fontSize:13,color:t2}}>{vandaagAanw} / {leerlingen.length} aanwezig</div>
            <div style={BA({height:12,marginTop:8})}><div style={FI(leerlingen.length?vandaagAanw/leerlingen.length*100:0,PR)}/></div>
          </div>

          {/* Aanwezigheid per dag grafiek */}
          {aanwPerDag.length>0&&<div style={C({margin:'0 16px'})}>
            <span style={L()}>Laatste lessen</span>
            {aanwPerDag.map((d,i)=>(<div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
              <div style={{fontSize:11,color:tm,minWidth:60,flexShrink:0}}>{d.datum}</div>
              <div style={{flex:1}}>
                <div style={BA({height:18})}><div style={{...FI(d.pct,d.pct>=70?PR:d.pct>=50?ACC:ERR),display:'flex',alignItems:'center',paddingLeft:6}}>
                  {d.pct>20&&<span style={{fontSize:10,color:'#fff',fontWeight:600}}>{d.aanw}/{d.totaal}</span>}
                </div></div>
              </div>
              <div style={{fontSize:12,fontWeight:600,color:d.pct>=70?PR:d.pct>=50?ACC:ERR,minWidth:35,textAlign:'right'}}>{d.pct}%</div>
            </div>))}
          </div>}

          {/* Per leerling lijst */}
          <div style={C({margin:'0 16px'})}>
            <span style={L()}>Per leerling</span>
            {[...leerlingen].sort((a,b)=>apct(b.aanwezigheid)-apct(a.aanwezigheid)).map(l=>{
              const ap=apct(l.aanwezigheid);const afw=l.aanwezigheid.filter(a=>!a.aanwezig).length;
              return(<div key={l.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:`0.5px solid ${bo}`}}>
                <div style={{width:32,height:32,borderRadius:'50%',background:okbg,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,color:PR,fontSize:13,flexShrink:0}}>{l.naam.charAt(0).toUpperCase()}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,color:t1}}>{l.naam}</div>
                  <div style={BA({height:6,marginTop:3})}><div style={FI(ap,ap>=70?PR:ap>=50?ACC:ERR)}/></div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:ap>=70?PR:ap>=50?ACC:ERR}}>{ap}%</div>
                  {afw>=3&&<div style={{fontSize:10,color:ERR}}>{afw}x afw. ⚠️</div>}
                </div>
              </div>);
            })}
          </div>
        </div>}

        {/* ── TAB: VOORTGANG ── */}
        {bTab==='voortgang'&&<div style={{padding:'16px 0'}}>

          {/* Ilmihal per categorie */}
          <div style={C({margin:'0 16px'})}>
            <span style={L()}>📚 Ilmihal per categorie</span>
            {ilmCatStats.map(cat=>(<div key={cat.id} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                <span style={{fontSize:13,color:t1}}>{cat.icon} {cat.nl}</span>
                <span style={{fontSize:12,fontWeight:600,color:cat.pct>=80?PR:cat.pct>=50?ACC:ERR}}>{cat.pct}%{cat.pct<40&&' ⬇️'}</span>
              </div>
              <div style={BA({height:10})}><div style={FI(cat.pct,cat.pct>=80?PR:cat.pct>=50?ACC:ERR)}/></div>
              <div style={{fontSize:10,color:tm}}>{cat.lessen.length} lessen · {cat.pct<40?'Achterloopt — aandacht nodig':'op schema'}</div>
            </div>))}
          </div>

          {/* Sura's voortgang */}
          <div style={C({margin:'0 16px'})}>
            <span style={L()}>📖 Sura's per niveau</span>
            {NIVEAUS.map(n=>{
              const surasNiv=SURAS.filter(s=>s.niv===n.id);
              const pct=leerlingen.length?Math.round(leerlingen.reduce((s,l)=>s+surasNiv.filter(sr=>(l.suras||{})[sr.id]).length/surasNiv.length*100,0)/leerlingen.length):0;
              return(<div key={n.id} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}>
                  <span style={BD(n.color,n.bg)}>{n.nl}</span>
                  <span style={{fontWeight:600,color:t2}}>{pct}% gem.</span>
                </div>
                <div style={BA({height:8,marginTop:5})}><div style={FI(pct,n.color)}/></div>
              </div>);
            })}
          </div>

          {/* Individuele voortgang ranking */}
          <div style={C({margin:'0 16px'})}>
            <span style={L()}>📈 Individuele totaalvoortgang</span>
            {[...leerlingen].sort((a,b)=>{
              const pA=(apct(a.aanwezigheid)+telObj(a.vaardigheden)/VAARD.length*100+telObj(a.suras)/SURAS.length*100+telObj(a.ilmihal)/TOTAL_ILM*100)/4;
              const pB=(apct(b.aanwezigheid)+telObj(b.vaardigheden)/VAARD.length*100+telObj(b.suras)/SURAS.length*100+telObj(b.ilmihal)/TOTAL_ILM*100)/4;
              return pB-pA;
            }).map((l,i)=>{
              const totP=Math.round((apct(l.aanwezigheid)+telObj(l.vaardigheden)/VAARD.length*100+telObj(l.suras)/SURAS.length*100+telObj(l.ilmihal)/TOTAL_ILM*100)/4);
              return(<div key={l.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:`0.5px solid ${bo}`}}>
                <div style={{fontSize:13,fontWeight:700,color:tm,minWidth:20}}>{i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,color:t1,marginBottom:3}}>{l.naam}</div>
                  <div style={BA({height:7})}><div style={FI(totP,totP>=70?PR:totP>=50?ACC:ERR)}/></div>
                </div>
                <div style={{fontSize:15,fontWeight:700,color:totP>=70?PR:totP>=50?ACC:ERR,minWidth:40,textAlign:'right'}}>{totP}%</div>
              </div>);
            })}
          </div>
        </div>}

        {bericht&&<div style={TS}>{bericht}</div>}
      </div>
    );
  }

  /* ══════════════════════════════════════════
     EFENDIJA DASHBOARD
  ══════════════════════════════════════════ */
  if(scherm==='ef'){
    const todayM=l=>l.aanwezigheid.find(a=>a.datum===dag());
    const totA=leerlingen.filter(l=>todayM(l)?.aanwezig).length;
    return(
      <div style={{background:bg,minHeight:'100vh',paddingBottom:65}}>
        <div style={HD}>
          <div style={{fontSize:20,fontWeight:700,color:'#fff'}}>Efendija {opslaan&&<span style={{fontSize:11,opacity:.6}}>💾</span>}</div>
          <div style={{fontSize:11,color:'rgba(255,255,255,.5)'}}>{leerlingen.length} leerlingen · IKC DIN</div>
        </div>
        <div style={{display:'flex',background:cbg,borderBottom:`1px solid ${bo}`}}>
          {[{id:'klas',icon:'👥',nl:'Klas',bs:'Razred'},{id:'vandaag',icon:'📋',nl:'Vandaag',bs:'Danas'},{id:'inst',icon:'⚙️',nl:'Inst.',bs:'Post.'}].map(tb=>(
            <div key={tb.id} onClick={()=>setEfTab(tb.id)} style={{flex:1,padding:'11px 0',textAlign:'center',cursor:'pointer',borderBottom:`2.5px solid ${efTab===tb.id?PR:'transparent'}`}}>
              <div style={{fontSize:18}}>{tb.icon}</div>
              <div style={{fontSize:10,color:efTab===tb.id?PR:tm,fontWeight:efTab===tb.id?700:400,marginTop:1}}>{bs?tb.bs:tb.nl}</div>
            </div>
          ))}
        </div>

        {efTab==='klas'&&<div style={{padding:'14px 0'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,padding:'0 16px',marginBottom:12}}>
            {[{l:bs?'Učenika':'Leerlingen',v:leerlingen.length,c:PR},{l:bs?'Danas':'Vandaag',v:totA,c:PR}].map(st=>(<div key={st.l} style={C({padding:'12px',margin:0,textAlign:'center'})}><div style={{fontSize:22,fontWeight:700,color:st.c}}>{st.v}</div><div style={{fontSize:9,color:tm,marginTop:1}}>{st.l}</div></div>))}
          </div>
          {leerlingen.length===0&&<div style={C({margin:'0 16px',textAlign:'center',padding:28})}><div style={{fontSize:32,marginBottom:8}}>🌱</div><p style={{margin:0,fontSize:14,color:tm}}>Geen leerlingen</p></div>}
          {NIVEAUS.map(n=>{
            const groep=leerlingen.filter(l=>l.niveau===n.id);
            if(!groep.length)return null;
            return(<div key={n.id}>
              <div style={{padding:'4px 16px 8px',display:'flex',alignItems:'center',gap:8}}><span style={BD(n.color,n.bg)}>{bs?n.bs:n.nl}</span><span style={{fontSize:12,color:tm}}>{groep.length}</span></div>
              {groep.map(l=>{
                const tm2=todayM(l);const ap=apct(l.aanwezigheid);const ip=Math.round(telObj(l.ilmihal)/TOTAL_ILM*100);const warn=l.aanwezigheid.filter(a=>!a.aanwezig).length>=3;
                return(<div key={l.id} style={C({margin:'0 16px 10px'})}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:36,height:36,borderRadius:'50%',background:okbg,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,color:PR,fontSize:15}}>{l.naam.charAt(0).toUpperCase()}</div>
                      <div><div style={{fontWeight:700,fontSize:14,color:t1}}>{l.naam}{warn&&' ⚠️'}</div><div style={{fontSize:11,color:tm}}>{l.ouder||'—'}</div></div>
                    </div>
                    <div style={{fontSize:12,fontWeight:600,color:ACC}}>⭐{l.punten}</div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:10}}>
                    {[[bs?'Prisust.':'Aanwez.',ap,PR],[bs?'Ilmihal':'Ilmihal',ip,INF],[bs?'Sure':"Sura's",Math.round(telObj(l.suras)/SURAS.length*100),'#880e4f']].map(([lb,val,col])=>(<div key={lb}><div style={{fontSize:10,color:tm}}>{lb}</div><div style={BA()}><div style={FI(val,col)}/></div><div style={{fontSize:11,fontWeight:600,color:col}}>{val}%</div></div>))}
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    <button onClick={()=>markeer(l.id,true)} style={{flex:1,padding:'8px 4px',borderRadius:8,border:`1.5px solid ${PR}`,background:tm2?.aanwezig?PR:'transparent',color:tm2?.aanwezig?'#fff':PR,fontSize:12,fontWeight:600,cursor:'pointer'}}>✓ {bs?'Prisutan':'Aanwezig'}</button>
                    <button onClick={()=>markeer(l.id,false)} style={{flex:1,padding:'8px 4px',borderRadius:8,border:`1.5px solid ${ERR}`,background:tm2&&!tm2.aanwezig?ERR:'transparent',color:tm2&&!tm2.aanwezig?'#fff':ERR,fontSize:12,fontWeight:600,cursor:'pointer'}}>✗ {bs?'Odsutan':'Afwezig'}</button>
                    <button onClick={()=>ga('detail',l)} style={{padding:'8px 12px',borderRadius:8,border:`1.5px solid ${bo}`,background:'transparent',color:PR,fontSize:13,fontWeight:600,cursor:'pointer'}}>→</button>
                  </div>
                </div>);
              })}
            </div>);
          })}
          {!form?(<div style={{padding:'4px 16px 8px'}}><button style={BT()} onClick={()=>setForm(true)}>+ {bs?'Dodaj učenika':'Leerling toevoegen'}</button></div>):(
            <div style={C({margin:'0 16px'})}>
              <div style={{fontWeight:700,fontSize:15,color:t1,marginBottom:14}}>{bs?'Novi učenik':'Nieuwe leerling'}</div>
              <span style={L()}>{bs?'Ime djeteta':'Naam kind'} *</span>
              <input style={IN()} placeholder={bs?'Ime':'Naam'} value={nieuw.naam} onChange={e=>setNieuw({...nieuw,naam:e.target.value})}/>
              <span style={L()}>{bs?'Ime roditelja':'Naam ouder'}</span>
              <input style={IN()} placeholder={bs?'Opcionalno':'Optioneel'} value={nieuw.ouder} onChange={e=>setNieuw({...nieuw,ouder:e.target.value})}/>
              <span style={L()}>PIN (4 {bs?'cifre':'cijfers'})</span>
              <input style={IN()} type="number" placeholder="1234" value={nieuw.pin} onChange={e=>setNieuw({...nieuw,pin:e.target.value.slice(0,4)})}/>
              <span style={L()}>{bs?'Nivo':'Niveau'}</span>
              <div style={{display:'flex',gap:8,marginBottom:14}}>
                {NIVEAUS.map(n=>(<div key={n.id} style={{flex:1,padding:'10px 4px',borderRadius:10,border:`2px solid ${nieuw.niveau===n.id?n.color:bo}`,cursor:'pointer',textAlign:'center',background:nieuw.niveau===n.id?n.bg:cbg}} onClick={()=>setNieuw({...nieuw,niveau:n.id})}><div style={{fontSize:11,fontWeight:700,color:n.color}}>{bs?n.bs:n.nl}</div></div>))}
              </div>
              <button style={BT()} onClick={voegToe}>{bs?'Sačuvaj':'Opslaan'}</button>
              <button style={BO()} onClick={()=>{setForm(false);setNieuw({naam:'',ouder:'',niveau:1,pin:''})}}>{bs?'Otkaži':'Annuleren'}</button>
            </div>
          )}
        </div>}

        {efTab==='vandaag'&&<div style={{padding:'14px 0'}}>
          <div style={C({margin:'0 16px',background:okbg,border:`1px solid ${okbo}`})}><div style={{fontWeight:700,color:PR,marginBottom:4}}>📋 {dag()}</div><div style={{fontSize:13,color:t2}}>{totA} aanwezig</div></div>
          {leerlingen.map(l=>{const tm2=l.aanwezigheid.find(a=>a.datum===dag());return(
            <div key={l.id} style={C({margin:'0 16px 8px',display:'flex',alignItems:'center',gap:12,padding:'14px 16px'})}>
              <div style={{width:32,height:32,borderRadius:'50%',background:okbg,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,color:PR,fontSize:14,flexShrink:0}}>{l.naam.charAt(0).toUpperCase()}</div>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:t1}}>{l.naam}</div><div style={{fontSize:11,color:tm2?.aanwezig?PR:tm2&&!tm2.aanwezig?ERR:tm}}>{tm2?.aanwezig?'✓':tm2&&!tm2.aanwezig?'✗':'–'}</div></div>
              <div style={{display:'flex',gap:5}}>
                <button onClick={()=>markeer(l.id,true)} style={{width:34,height:34,borderRadius:8,border:`1.5px solid ${PR}`,background:tm2?.aanwezig?PR:'transparent',color:tm2?.aanwezig?'#fff':PR,fontSize:15,cursor:'pointer',padding:0}}>✓</button>
                <button onClick={()=>markeer(l.id,false)} style={{width:34,height:34,borderRadius:8,border:`1.5px solid ${ERR}`,background:tm2&&!tm2.aanwezig?ERR:'transparent',color:tm2&&!tm2.aanwezig?'#fff':ERR,fontSize:15,cursor:'pointer',padding:0}}>✗</button>
              </div>
            </div>);})}
        </div>}

        {efTab==='inst'&&<div style={{padding:'14px 0'}}>
          <div style={C({margin:'0 16px'})}>
            <div style={{fontWeight:700,fontSize:15,color:t1,marginBottom:14}}>🌐 Taal</div>
            <div style={{display:'flex',gap:8}}>{['nl','bs'].map(l=>(<button key={l} onClick={()=>slaT(l)} style={{flex:1,padding:'11px',borderRadius:10,border:`1.5px solid ${taal===l?PR:bo}`,background:taal===l?PR:'transparent',color:taal===l?'#fff':t2,fontSize:13,fontWeight:600,cursor:'pointer'}}>{l==='nl'?'🇳🇱 NL':'🇧🇦 BS'}</button>))}</div>
          </div>
          <div style={C({margin:'0 16px'})}>
            <div style={{fontWeight:700,fontSize:15,color:t1,marginBottom:12}}>🌗 Thema</div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}><span style={{fontSize:14,color:t2}}>{donker?'Donker':'Licht'}</span><div style={TO(donker)} onClick={()=>slaD(!donker)}><div style={TD(donker)}/></div></div>
          </div>
          <div style={{padding:'4px 16px'}}><button style={BO()} onClick={()=>setScherm('welkom')}>← Uitloggen</button></div>
        </div>}
        {bericht&&<div style={TS}>{bericht}</div>}
      </div>
    );
  }

  /* ══════════════════════════════════════════
     LEERLING DETAIL
  ══════════════════════════════════════════ */
  if(scherm==='detail'&&huidig){
    const l=huidig;const ni=nivInfo(l.niveau);const ap=apct(l.aanwezigheid);
    const warn=l.aanwezigheid.filter(a=>!a.aanwezig).length>=3;

    const IlmihalTab=()=>{
      const ilmData=l.ilmihal||emptyI();const totalDone=telObj(ilmData);
      if(ilmCat){
        const cat=ILMIHAL.find(c=>c.id===ilmCat);const catDone=cat.lessen.filter(ls=>ilmData[ls.id]).length;
        return(<div style={{padding:'0 16px 20px'}}>
          <button onClick={()=>setIlmCat(null)} style={BS({background:'transparent',color:PR,border:`1px solid ${bo}`,marginBottom:12})}>← Terug</button>
          <div style={C()}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <span style={{fontSize:26}}>{cat.icon}</span>
              <div><div style={{fontWeight:700,fontSize:15,color:t1}}>{bs?cat.bs:cat.nl}</div><div style={{fontSize:12,color:tm}}>{catDone}/{cat.lessen.length}</div></div>
            </div>
            <div style={BA()}><div style={FI(Math.round(catDone/cat.lessen.length*100),PR)}/></div>
            {NIVEAUS.map(n=>{const groep=cat.lessen.filter(ls=>ls.niv===n.id);return groep.length?(<div key={n.id} style={{marginTop:14}}>
              <div style={{...BD(n.color,n.bg),marginBottom:8,fontSize:10}}>{bs?n.bs:n.nl}</div>
              {groep.map(ls=>(<div key={ls.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px 12px',borderRadius:10,marginBottom:6,background:ilmData[ls.id]?okbg:(donker?'#1a2a1a':'#f8f8f8'),border:`1px solid ${ilmData[ls.id]?okbo:bo}`}}>
                <span style={{fontSize:13,flex:1,color:ilmData[ls.id]?PR:t1,fontWeight:ilmData[ls.id]?600:400}}>{bs?ls.bs:ls.nl}{ilmData[ls.id]&&<span style={{fontSize:10,color:PR,marginLeft:6}}>+20pts</span>}</span>
                <div style={TO(ilmData[ls.id])} onClick={()=>toggleI(l.id,ls.id)}><div style={TD(ilmData[ls.id])}/></div>
              </div>))}
            </div>):null;})}
          </div>
        </div>);
      }
      return(<div style={{padding:'14px 16px 20px'}}>
        <div style={C({background:okbg,border:`1px solid ${okbo}`})}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}><span style={{fontWeight:700,fontSize:14,color:PR}}>📚 Totaal</span><span style={{fontSize:16,fontWeight:700,color:PR}}>{Math.round(totalDone/TOTAL_ILM*100)}%</span></div>
          <div style={BA()}><div style={FI(Math.round(totalDone/TOTAL_ILM*100),PR)}/></div>
          <div style={{fontSize:12,color:t2,marginTop:4}}>{totalDone}/{TOTAL_ILM} lessen</div>
        </div>
        {ILMIHAL.map(cat=>{const catDone=cat.lessen.filter(ls=>ilmData[ls.id]).length;const catPct=Math.round(catDone/cat.lessen.length*100);return(<div key={cat.id} style={{...C(),cursor:'pointer'}} onClick={()=>setIlmCat(cat.id)}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:24,flexShrink:0}}>{cat.icon}</span>
            <div style={{flex:1}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontWeight:700,fontSize:14,color:t1}}>{bs?cat.bs:cat.nl}</span><span style={{fontSize:12,fontWeight:600,color:catPct===100?PR:INF,marginLeft:8}}>{catDone}/{cat.lessen.length}</span></div>
              <div style={BA({marginTop:4})}><div style={FI(catPct,catPct===100?PR:INF)}/></div>
            </div>
            {catPct===100&&<span style={{fontSize:18}}>🏆</span>}
          </div>
        </div>);})}
      </div>);
    };

    return(
      <div style={{background:bg,minHeight:'100vh'}}>
        <div style={{...HD,paddingBottom:14}}>
          <button style={BB} onClick={()=>{setScherm('ef');setIlmCat(null);}}>← Terug</button>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:19,fontWeight:700,color:'#fff'}}>{l.naam} {opslaan&&<span style={{fontSize:12,opacity:.5}}>💾</span>}</div>
            <span style={{background:'rgba(200,147,42,.25)',color:'#f0c060',borderRadius:20,padding:'4px 12px',fontSize:12,fontWeight:700}}>⭐ {l.punten}</span>
          </div>
          <div style={{fontSize:11,color:'rgba(255,255,255,.5)',marginTop:2}}>{ap}% · {bs?ni.bs:ni.nl}</div>
          {warn&&<div style={{fontSize:11,color:'#ffd700',marginTop:4}}>⚠️ 3+ keer afwezig</div>}
        </div>
        <div style={{display:'flex',overflowX:'auto',background:cbg,borderBottom:`1px solid ${bo}`}}>
          {[{id:'profiel',i:'👤',nl:'Profiel',bs:'Profil'},{id:'ilmihal',i:'📚',nl:'Ilmihal',bs:'Ilmihal'},{id:'vaard',i:'✅',nl:'Vaardigh.',bs:'Vještine'},{id:'suras',i:'📖',nl:"Sura's",bs:'Sure'},{id:'hw',i:'📝',nl:'Huiswerk',bs:'Domaći'}].map(tb=>(
            <div key={tb.id} onClick={()=>{setDTab(tb.id);setIlmCat(null);}} style={{flex:'0 0 auto',padding:'10px 14px',cursor:'pointer',borderBottom:`2.5px solid ${dTab===tb.id?PR:'transparent'}`,color:dTab===tb.id?PR:tm,fontWeight:dTab===tb.id?700:400,fontSize:12,whiteSpace:'nowrap'}}>
              {tb.i} {bs?tb.bs:tb.nl}
            </div>
          ))}
        </div>

        {dTab==='profiel'&&<div style={{padding:'14px 0'}}>
          <div style={C({margin:'0 16px'})}><span style={L()}>Niveau</span><div style={{display:'flex',gap:8}}>{NIVEAUS.map(n=>(<div key={n.id} style={{flex:1,padding:'10px 4px',borderRadius:10,border:`2px solid ${l.niveau===n.id?n.color:bo}`,cursor:'pointer',textAlign:'center',background:l.niveau===n.id?n.bg:cbg}} onClick={()=>updateNiv(l.id,n.id)}><div style={{fontSize:11,fontWeight:700,color:n.color}}>{bs?n.bs:n.nl}</div></div>))}</div></div>
          <div style={C({margin:'0 16px'})}>
            <span style={L()}>Notities</span>
            <textarea style={{...IN(),minHeight:70,resize:'vertical',marginBottom:8}} placeholder="Notitie..." value={notitie} onChange={e=>setNot(e.target.value)}/>
            <button style={BS({background:PR,color:'#fff'})} onClick={()=>slaNotitie(l.id)}>Opslaan</button>
            <div style={{marginTop:12}}>
              {!l.notities.length&&<p style={{fontSize:13,color:tm,textAlign:'center',padding:'8px 0'}}>Geen notities</p>}
              {l.notities.slice(0,6).map((n,i)=>(<div key={i} style={{background:donker?'#0d2a15':'#f8faf8',borderRadius:8,padding:'10px 12px',marginBottom:6,borderLeft:'3px solid '+ACC}}><div style={{fontSize:10,color:tm,marginBottom:2}}>{n.datum}</div><div style={{fontSize:13,color:t1}}>{n.tekst}</div></div>))}
            </div>
          </div>
          <div style={C({margin:'0 16px'})}>
            <span style={L()}>Aanwezigheid log</span>
            {!l.aanwezigheid.length&&<p style={{fontSize:13,color:tm,textAlign:'center'}}>–</p>}
            {l.aanwezigheid.slice(-10).reverse().map((a,i)=>(<div key={i} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`0.5px solid ${bo}`}}><span style={{fontSize:13,color:t2}}>{a.datum}</span><span style={{fontSize:12,fontWeight:600,color:a.aanwezig?PR:ERR}}>{a.aanwezig?'✓':'✗'}</span></div>))}
          </div>
          <div style={{padding:'0 16px 20px'}}><button style={{background:'transparent',color:ERR,border:`1.5px solid ${ERR}`,borderRadius:10,padding:'12px 16px',fontSize:14,fontWeight:600,cursor:'pointer',width:'100%'}} onClick={()=>{if(window.confirm(`${l.naam} verwijderen?`))verwijder(l.id);}}>Verwijderen</button></div>
        </div>}

        {dTab==='ilmihal'&&<IlmihalTab/>}

        {dTab==='vaard'&&<div style={{padding:'14px 16px'}}><div style={C()}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><span style={L()}>Vaardigheden</span><span style={{fontSize:13,fontWeight:700,color:ACC}}>{telObj(l.vaardigheden)}/{VAARD.length}</span></div>
          <div style={BA()}><div style={FI(Math.round(telObj(l.vaardigheden)/VAARD.length*100),ACC)}/></div>
          <div style={{marginTop:12}}>{VAARD.map(v=>(<div key={v.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px 0',borderBottom:`0.5px solid ${bo}`}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:18}}>{v.icon}</span><span style={{fontSize:14,color:t1}}>{bs?v.bs:v.nl}</span></div>
            <div style={TO(l.vaardigheden[v.id])} onClick={()=>toggleV(l.id,v.id)}><div style={TD(l.vaardigheden[v.id])}/></div>
          </div>))}</div>
        </div></div>}

        {dTab==='suras'&&<div style={{padding:'14px 16px'}}><div style={C()}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><span style={L()}>Sura's</span><span style={{fontSize:13,fontWeight:700,color:'#880e4f'}}>{telObj(l.suras)}/{SURAS.length}</span></div>
          <div style={BA()}><div style={FI(Math.round(telObj(l.suras)/SURAS.length*100),'#880e4f')}/></div>
          {NIVEAUS.map(n=>{const groep=SURAS.filter(s=>s.niv===n.id);return(<div key={n.id} style={{marginTop:14}}>
            <div style={{...BD(n.color,n.bg),marginBottom:10,fontSize:10}}>{bs?n.bs:n.nl}</div>
            {groep.map(sr=>(<div key={sr.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px 0',borderBottom:`0.5px solid ${bo}`}}>
              <span style={{fontSize:14,color:t1}}>{bs?sr.bs:sr.nl}</span>
              <div style={TO(l.suras[sr.id])} onClick={()=>toggleS(l.id,sr.id)}><div style={TD(l.suras[sr.id])}/></div>
            </div>))}
          </div>);})}
        </div></div>}

        {dTab==='hw'&&<div style={{padding:'14px 16px'}}>
          <div style={C()}>
            <span style={L()}>Huiswerk toevoegen</span>
            <textarea style={{...IN(),minHeight:65,resize:'vertical',marginBottom:8}} placeholder="Opdracht..." value={hwTxt} onChange={e=>setHwTxt(e.target.value)}/>
            <button style={BS({background:PR,color:'#fff'})} onClick={()=>voegHW(l.id)}>Opslaan</button>
          </div>
          <div style={C()}>
            <span style={L()}>Huiswerk</span>
            {!l.huiswerk.length&&<p style={{fontSize:13,color:tm,textAlign:'center',padding:'8px 0'}}>Geen huiswerk</p>}
            {[...l.huiswerk].reverse().map(h=>(<div key={h.id} style={{display:'flex',gap:10,alignItems:'flex-start',padding:'10px 0',borderBottom:`0.5px solid ${bo}`}}>
              <div style={TO(h.afgerond)} onClick={()=>toggleHW(l.id,h.id)}><div style={TD(h.afgerond)}/></div>
              <div style={{flex:1}}><div style={{fontSize:10,color:tm,marginBottom:2}}>{h.datum}</div><div style={{fontSize:13,color:h.afgerond?tm:t1,textDecoration:h.afgerond?'line-through':'none'}}>{h.opdracht}</div></div>
              <button style={{background:'transparent',border:'none',color:ERR,fontSize:18,cursor:'pointer',padding:'0 4px'}} onClick={()=>verwijderHW(l.id,h.id)}>×</button>
            </div>))}
          </div>
        </div>}
        {bericht&&<div style={TS}>{bericht}</div>}
      </div>
    );
  }

  /* ══════════════════════════════════════════
     OUDER
  ══════════════════════════════════════════ */
  if(scherm==='ouder')return(
    <div style={{background:bg,minHeight:'100vh'}}>
      <div style={HD}><button style={BB} onClick={()=>{setScherm('welkom');setGev(null);setZoek('');}}>← Terug</button><div style={{fontSize:20,fontWeight:700,color:'#fff'}}>{bs?'Roditelj':'Ouder'}</div></div>
      <div style={{padding:'20px 16px 0'}}>
        <div style={C()}>
          <span style={L()}>Naam van uw kind</span>
          <input style={IN()} placeholder="Voer naam in..." value={zoek} onChange={e=>setZoek(e.target.value)} onKeyDown={e=>e.key==='Enter'&&zoekL()}/>
          <button style={BT()} onClick={zoekL}>Zoeken</button>
        </div>
        {gevonden&&(()=>{const l=gevonden;const ni=nivInfo(l.niveau);
          return(<>
            <div style={C({background:okbg,border:`1px solid ${okbo}`})}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div><div style={{fontWeight:700,fontSize:18,color:t1}}>{l.naam}</div><span style={BD(ni.color,ni.bg)}>{bs?ni.bs:ni.nl}</span></div>
                <div style={{textAlign:'center'}}><div style={{fontSize:26,fontWeight:700,color:ACC}}>{l.punten}</div><div style={{fontSize:10,color:tm}}>punten</div></div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {[['📋',apct(l.aanwezigheid),PR,'Aanwez.'],['✅',Math.round(telObj(l.vaardigheden)/VAARD.length*100),ACC,'Vaardigh.'],["📖",Math.round(telObj(l.suras)/SURAS.length*100),'#880e4f',"Sura's"],['📚',Math.round(telObj(l.ilmihal)/TOTAL_ILM*100),INF,'Ilmihal']].map(([ic,val,col,lb])=>(<div key={lb} style={{textAlign:'center'}}>
                  <div style={{fontSize:16}}>{ic}</div><div style={{fontSize:16,fontWeight:700,color:col}}>{val}%</div>
                  <div style={{fontSize:9,color:tm}}>{lb}</div><div style={BA({marginTop:3})}><div style={FI(val,col)}/></div>
                </div>))}
              </div>
            </div>
            {l.huiswerk.filter(h=>!h.afgerond).length>0&&<div style={C()}>
              <span style={L()}>📝 Open huiswerk</span>
              {l.huiswerk.filter(h=>!h.afgerond).map(h=>(<div key={h.id} style={{padding:'8px 0',borderBottom:`0.5px solid ${bo}`}}><div style={{fontSize:11,color:tm}}>{h.datum}</div><div style={{fontSize:13,color:t1}}>{h.opdracht}</div></div>))}
            </div>}
            {l.notities.length>0&&<div style={C()}>
              <span style={L()}>Notities efendija</span>
              {l.notities.slice(0,3).map((n,i)=>(<div key={i} style={{background:donker?'#0d2a15':'#f8faf8',borderRadius:8,padding:'10px 12px',marginBottom:6,borderLeft:'3px solid '+ACC}}><div style={{fontSize:10,color:tm,marginBottom:2}}>{n.datum}</div><div style={{fontSize:13,color:t1}}>{n.tekst}</div></div>))}
            </div>}
          </>);
        })()}
      </div>
      {bericht&&<div style={TS}>{bericht}</div>}
    </div>
  );

  /* ══════════════════════════════════════════
     KIND
  ══════════════════════════════════════════ */
  if(scherm==='kind')return(
    <div style={{background:bg,minHeight:'100vh'}}>
      <div style={HD}><button style={BB} onClick={()=>{setScherm('welkom');setGev(null);setZoek('');setPinInp('');}}>← Terug</button><div style={{fontSize:20,fontWeight:700,color:'#fff'}}>⭐ Mijn mekteb</div></div>
      <div style={{padding:'20px 16px 0'}}>
        {!gevonden?(
          <div style={C()}>
            <span style={L()}>Jouw naam</span>
            <input style={IN()} placeholder="Jouw naam..." value={zoek} onChange={e=>setZoek(e.target.value)} onKeyDown={e=>e.key==='Enter'&&zoekL()}/>
            <button style={BT()} onClick={zoekL}>Ga naar mijn pagina!</button>
            <div style={{display:'flex',alignItems:'center',gap:8,margin:'14px 0 10px'}}><div style={{flex:1,height:1,background:bo}}/><span style={{fontSize:12,color:tm}}>of PIN</span><div style={{flex:1,height:1,background:bo}}/></div>
            <input style={{...IN(),letterSpacing:8,textAlign:'center',fontSize:20}} type="number" placeholder="1234" value={pinInp} onChange={e=>{setPinInp(e.target.value.slice(0,4));setPinErr(false);}} onKeyDown={e=>e.key==='Enter'&&zoekPIN()}/>
            {pinErr&&<p style={{color:ERR,fontSize:13,textAlign:'center',margin:'0 0 8px'}}>Onjuiste PIN</p>}
            <button style={BO()} onClick={zoekPIN}>Login PIN</button>
          </div>
        ):(()=>{
          const l=gevonden;const cnt=telObj(l.vaardigheden);const scnt=telObj(l.suras);const icnt=telObj(l.ilmihal||{});
          const total=cnt+scnt+icnt;const maxT=VAARD.length+SURAS.length+TOTAL_ILM;
          const emoji=total===0?'🌱':total<=8?'🌿':total<=20?'⭐':total<=35?'🌟':'🏆';
          const msgs=['Welkom bij het mekteb!','Goed bezig, ga door!','Mashallah, super goed!','Barakallahu feekum! 🌟'];
          const msg=msgs[Math.min(total===0?0:total<=8?1:total<=20?2:3,3)];
          return(<>
            <div style={C({background:'linear-gradient(135deg,#1a5c2e,#0d3a1e)',color:'#fff',textAlign:'center',padding:'24px 16px'})}>
              <div style={{fontSize:52,marginBottom:6}}>{emoji}</div>
              <div style={{fontSize:19,fontWeight:700,marginBottom:4}}>Assalamu Alaikum, {l.naam}!</div>
              <div style={{fontSize:13,color:'rgba(255,255,255,.65)',marginBottom:16}}>{msg}</div>
              <div style={{fontSize:34,fontWeight:700,color:'#f0c060'}}>{l.punten}</div>
              <div style={{fontSize:11,color:'rgba(255,255,255,.45)'}}>punten verdiend</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {[{l:'Aanwez.',v:apct(l.aanwezigheid),c:PR,i:'📋'},{l:'Vaardigh.',v:Math.round(cnt/VAARD.length*100),c:ACC,i:'✅'},{l:"Sura's",v:Math.round(scnt/SURAS.length*100),c:'#880e4f',i:'📖'},{l:'Ilmihal',v:Math.round(icnt/TOTAL_ILM*100),c:INF,i:'📚'}].map(st=>(<div key={st.l} style={C({padding:'12px 8px',margin:0,textAlign:'center'})}>
                <div style={{fontSize:18}}>{st.i}</div><div style={{fontSize:18,fontWeight:700,color:st.c,marginTop:3}}>{st.v}%</div>
                <div style={{fontSize:9,color:tm,marginTop:1}}>{st.l}</div><div style={BA({marginTop:4})}><div style={FI(st.v,st.c)}/></div>
              </div>))}
            </div>
            <div style={C()}>
              <div style={{fontWeight:700,fontSize:14,color:t1,marginBottom:10}}>📚 Ilmihal voortgang</div>
              {ILMIHAL.map(cat=>{const ilmData=l.ilmihal||{};const catDone=cat.lessen.filter(ls=>ilmData[ls.id]).length;const catPct=Math.round(catDone/cat.lessen.length*100);
                return(<div key={cat.id} style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}><span style={{fontSize:13,color:t1}}>{cat.icon} {bs?cat.bs:cat.nl}</span><span style={{fontSize:12,fontWeight:600,color:catPct===100?PR:INF}}>{catDone}/{cat.lessen.length}{catPct===100&&' 🏆'}</span></div>
                  <div style={BA({height:6})}><div style={FI(catPct,catPct===100?PR:INF)}/></div>
                </div>);
              })}
            </div>
            {l.huiswerk.filter(h=>!h.afgerond).length>0&&<div style={C()}>
              <span style={L()}>📝 Open huiswerk</span>
              {l.huiswerk.filter(h=>!h.afgerond).map(h=>(<div key={h.id} style={{padding:'8px 0',borderBottom:`0.5px solid ${bo}`}}><div style={{fontSize:11,color:tm}}>{h.datum}</div><div style={{fontSize:13,color:t1}}>{h.opdracht}</div></div>))}
            </div>}
            <div style={{...C({background:okbg,border:`1px solid ${okbo}`,textAlign:'center',padding:14}),marginBottom:24}}>
              <p style={{margin:0,fontSize:13,color:PR}}>☽ Barakallahu feekum! — IKC DIN</p>
            </div>
          </>);
        })()}
      </div>
      {bericht&&<div style={TS}>{bericht}</div>}
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
