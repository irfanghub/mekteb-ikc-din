<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Mekteb IKC DIN — v5</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Amiri&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:light;
  --green:#1a5c2e; --green-soft:#e8f5e9; --green-mid:#26a04a;
  --gold:#c8932a; --gold-soft:#fff5dc; --gold-bright:#f4c430;
  --blue:#3b82f6; --blue-soft:#e0efff;
  --orange:#f97316; --orange-soft:#fff1e0;
  --purple:#8b5cf6; --purple-soft:#f0eaff;
  --red:#ef4444; --red-soft:#fee2e2;
  --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
  --bg:#fafaf7; --card:#ffffff;
  --shadow-sm:0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
  --shadow:0 4px 12px rgba(15,23,42,.06), 0 2px 4px rgba(15,23,42,.04);
  --shadow-lg:0 10px 25px rgba(15,23,42,.08), 0 4px 10px rgba(15,23,42,.05);
  --radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:#eef0ec;color:var(--ink);font-family:'Nunito',system-ui,sans-serif;font-weight:600;-webkit-font-smoothing:antialiased}
button{font-family:inherit;border:0;background:none;cursor:pointer;color:inherit}
button:active{transform:scale(.97)}
input,select,textarea{font-family:inherit;font-weight:600}

.frame{display:flex;justify-content:center;padding:24px 12px}
.app{width:100%;max-width:420px;min-height:760px;background:var(--bg);position:relative;overflow:hidden;border-radius:32px;box-shadow:0 30px 60px rgba(15,23,42,.18),0 8px 20px rgba(15,23,42,.08);border:1px solid #d8dbd5}

.screen{padding:18px 16px 100px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.h1{font-weight:900;font-size:26px;letter-spacing:-.4px;margin:0}
.h2{font-weight:800;font-size:20px;letter-spacing:-.3px;margin:0}
.h3{font-weight:800;font-size:16px;margin:0}
.muted{color:var(--muted);font-weight:600}
.row{display:flex;align-items:center;gap:12px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;position:sticky;top:0;background:linear-gradient(var(--bg) 70%,transparent);z-index:5}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#fff;flex:0 0 auto;box-shadow:var(--shadow)}
.avatar.lg{width:64px;height:64px;font-size:24px}
.avatar.xl{width:88px;height:88px;font-size:32px}
.avatar.sm{width:34px;height:34px;font-size:14px}
.streak-chip{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#ffedd5,#ffd5a5);color:#9a3412;padding:8px 14px;border-radius:999px;font-weight:800;box-shadow:var(--shadow-sm);font-size:13px}
.back-btn{width:42px;height:42px;border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);font-size:18px}

.nav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 6px;z-index:10;border-radius:0 0 31px 31px}
.nav button{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;color:var(--muted);font-size:10px;font-weight:800;border-radius:14px;flex:1;max-width:80px}
.nav button.active{color:var(--green);background:var(--green-soft)}
.nav svg{width:22px;height:22px}

/* SPLASH (taalkeuze + welkom) */
.splash{min-height:760px;display:flex;flex-direction:column;align-items:center;padding:30px 24px;background:radial-gradient(circle at 30% 20%,#e8f5e9,#fafaf7 60%);border-radius:31px;text-align:center}
.splash-logo{width:110px;height:110px;border-radius:32px;background:linear-gradient(135deg,var(--green),var(--green-mid));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:42px;margin:18px 0 16px;box-shadow:0 18px 36px rgba(26,92,46,.25);font-family:'Amiri',serif}
.splash h1{margin:0 0 6px;font-size:28px;font-weight:900;letter-spacing:-.5px}
.splash .sub{margin:0 0 26px;color:var(--muted);font-weight:700;font-size:14px}
.lang-pick{display:flex;gap:10px;margin:0 auto 18px;width:100%;max-width:300px}
.lang-btn{flex:1;padding:14px;border-radius:18px;background:#fff;border:2px solid var(--line);font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow-sm);transition:.15s}
.lang-btn.on{border-color:var(--green);background:var(--green-soft);color:var(--green)}
.splash-cta{padding:16px 32px;background:var(--green);color:#fff;border-radius:18px;font-size:16px;font-weight:800;box-shadow:var(--shadow-lg);width:100%;max-width:300px;margin-top:4px}

/* ROL CARDS */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.role-card{background:#fff;border:2px solid var(--line);border-radius:18px;padding:18px 12px;text-align:center;box-shadow:var(--shadow-sm);cursor:pointer;transition:.15s}
.role-card:active{transform:scale(.96)}
.role-card .icon{font-size:32px;margin-bottom:8px}
.role-card .role-name{font-size:15px;font-weight:900;color:var(--ink)}
.role-card .role-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:700}
.role-card.efendija{border-color:#dcfce7}
.role-card.bestuur{border-color:#dbeafe}
.role-card.ouder{border-color:#fce7f3}
.role-card.kind{border-color:#fef3c7}

/* PERSON PICKER */
.head-back{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.head-back .ttl{font-weight:900;font-size:20px}
.head-back .stl{font-size:12px;color:var(--muted);font-weight:700}
.search-box{background:#fff;border-radius:14px;padding:10px 14px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:10px;margin-bottom:14px}
.search-box input{border:0;outline:0;flex:1;font-size:14px;background:transparent}
.kid-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kid-card{background:var(--card);border-radius:16px;padding:12px 8px;text-align:center;box-shadow:var(--shadow-sm);border:2px solid transparent}
.kid-card .avatar{margin:0 auto 6px}
.kid-card .name{font-size:12px;font-weight:800}
.kid-card .pin-tip{font-size:10px;color:var(--muted);font-weight:700;margin-top:2px}

/* PINCODE */
.pin-area{margin-top:18px;text-align:center}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:14px 0 22px}
.pin-dot{width:16px;height:16px;border-radius:50%;background:var(--line);transition:.15s}
.pin-dot.filled{background:var(--green);transform:scale(1.15)}
.pin-dot.error{background:var(--red);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:280px;margin:0 auto}
.key{background:#fff;border-radius:16px;padding:16px 0;font-size:22px;font-weight:800;box-shadow:var(--shadow-sm)}
.key.fn{background:transparent;box-shadow:none;color:var(--muted);font-size:12px;font-weight:800}

/* DASHBOARD */
.greeting{padding:8px 4px 14px}
.greeting h1{font-size:24px;font-weight:900;margin:0 0 2px;letter-spacing:-.4px}
.greeting p{margin:0;color:var(--muted);font-weight:700;font-size:13px}

.hero{background:linear-gradient(135deg,var(--green),var(--green-mid));color:#fff;border-radius:24px;padding:18px;position:relative;overflow:hidden;box-shadow:0 14px 28px rgba(26,92,46,.20);margin-bottom:14px;cursor:pointer}
.hero::after{content:"";position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.18),transparent 70%);right:-50px;top:-60px}
.hero-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;opacity:.85}
.hero-title{font-size:20px;font-weight:900;margin:4px 0 10px;line-height:1.15}
.hero-cta{background:#fff;color:var(--green);padding:9px 16px;border-radius:12px;font-weight:800;font-size:13px;display:inline-flex;align-items:center;gap:6px;box-shadow:0 6px 14px rgba(0,0,0,.18)}

.hero.purple{background:linear-gradient(135deg,#7c3aed,#a78bfa);box-shadow:0 14px 28px rgba(124,58,237,.20)}
.hero.purple .hero-cta{color:#7c3aed}
.hero.gold{background:linear-gradient(135deg,#d97706,var(--gold));box-shadow:0 14px 28px rgba(200,147,42,.25)}
.hero.gold .hero-cta{color:var(--gold)}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat{background:#fff;border-radius:16px;padding:12px 8px;text-align:center;box-shadow:var(--shadow-sm)}
.stat .icon{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:17px}
.stat .num{font-size:20px;font-weight:900;line-height:1;margin-bottom:2px}
.stat .lbl{font-size:10px;color:var(--muted);font-weight:700}

.section-head{display:flex;justify-content:space-between;align-items:center;margin:6px 4px 8px}
.section-head a{color:var(--green);font-weight:800;font-size:13px;text-decoration:none;cursor:pointer}

.badge-row{display:flex;gap:10px;overflow-x:auto;padding:4px 0 8px;margin:0 -16px;padding-left:16px;padding-right:16px}
.badge-row::-webkit-scrollbar{display:none}
.badge{flex:0 0 84px;background:#fff;border-radius:16px;padding:12px 8px;text-align:center;box-shadow:var(--shadow-sm)}
.badge.locked{opacity:.5;filter:grayscale(.6)}
.badge .b-icon{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--gold-bright),var(--gold));display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:22px;color:#fff;box-shadow:0 6px 14px rgba(200,147,42,.3)}
.badge .b-name{font-size:11px;font-weight:800;line-height:1.2}
.badge.locked .b-icon{background:#cbd5e1;box-shadow:none}

.list{background:#fff;border-radius:16px;box-shadow:var(--shadow-sm);overflow:hidden}
.list-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer}
.list-row:last-child{border:0}
.list-row:active{background:#f8fafc}
.list-row.me{background:var(--green-soft)}
.list-row .name{flex:1;font-weight:800}
.list-row .pts{font-weight:900;color:var(--green);font-size:15px}
.list-row .pts span{font-size:11px;color:var(--muted);font-weight:700;margin-left:4px}
.rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;background:#f1f5f9;color:var(--muted)}
.rank.r1{background:linear-gradient(135deg,#fde68a,#f59e0b);color:#fff;box-shadow:0 3px 6px rgba(245,158,11,.4)}
.rank.r2{background:linear-gradient(135deg,#e5e7eb,#9ca3af);color:#fff}
.rank.r3{background:linear-gradient(135deg,#fdba74,#c2410c);color:#fff}

/* TABS — sub-nav within a screen */
.subtabs{display:flex;background:#fff;border-radius:14px;padding:4px;box-shadow:var(--shadow-sm);margin-bottom:14px;gap:2px}
.subtab{flex:1;padding:9px 4px;text-align:center;font-weight:800;font-size:12px;color:var(--muted);border-radius:10px;cursor:pointer}
.subtab.on{background:var(--green);color:#fff}

/* PATH */
.path-head{padding:10px 4px 6px;text-align:center}
.path-head h2{font-size:22px;font-weight:900;letter-spacing:-.4px;margin:0}
.path-head p{margin:2px 0 0;color:var(--muted);font-weight:700;font-size:13px}
.level-tabs{display:flex;gap:8px;justify-content:center;margin:10px 0 6px}
.level-pill{padding:8px 16px;border-radius:999px;background:#fff;font-weight:800;font-size:12px;color:var(--muted);box-shadow:var(--shadow-sm);cursor:pointer;border:2px solid transparent}
.level-pill.on{background:var(--green);color:#fff;border-color:var(--green)}
.level-pill.done{background:var(--green-soft);color:var(--green);border-color:var(--green-mid)}

.path{position:relative;padding:24px 0 50px;display:flex;flex-direction:column;align-items:center;gap:18px}
.path::before{content:"";position:absolute;top:24px;bottom:50px;left:50%;width:5px;background:repeating-linear-gradient(to bottom,var(--line) 0 8px,transparent 8px 14px);transform:translateX(-50%);z-index:0}
.station{position:relative;display:flex;flex-direction:column;align-items:center;gap:5px;z-index:1}
.station-bubble{width:78px;height:78px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:28px;box-shadow:var(--shadow);position:relative}
.station.done .station-bubble{background:linear-gradient(135deg,var(--green-mid),var(--green));box-shadow:0 8px 18px rgba(26,92,46,.25)}
.station.done .station-bubble::after{content:"✓";position:absolute;right:-3px;bottom:-3px;width:28px;height:28px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;border:3px solid var(--bg);font-weight:900}
.station.current .station-bubble{background:linear-gradient(135deg,var(--gold-bright),var(--gold));animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(244,196,48,.5),0 8px 16px rgba(200,147,42,.3)}50%{box-shadow:0 0 0 12px rgba(244,196,48,0),0 8px 16px rgba(200,147,42,.3)}}
@keyframes pop{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
.station.locked .station-bubble{background:#cbd5e1;color:#fff;box-shadow:none}
.station.locked{opacity:.65}
.station-label{font-size:13px;font-weight:800;text-align:center}
.station-sub{font-size:11px;color:var(--muted);font-weight:700}
.station.zigzag-l{align-self:flex-start;margin-left:14%}
.station.zigzag-r{align-self:flex-end;margin-right:14%}
.station-tag{position:absolute;top:-7px;right:-12px;background:#fff;color:var(--orange);font-size:10px;font-weight:900;padding:3px 8px;border-radius:999px;box-shadow:var(--shadow-sm);text-transform:uppercase;letter-spacing:.5px}

.now-playing{position:absolute;bottom:74px;left:14px;right:14px;background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:#fff;border-radius:16px;padding:12px 14px;box-shadow:0 10px 28px rgba(200,147,42,.35);display:flex;align-items:center;gap:10px;z-index:9}
.now-playing .np-text{flex:1}
.now-playing .lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;opacity:.9}
.now-playing .ttl{font-size:14px;font-weight:900}
.now-playing button{background:#fff;color:var(--gold);padding:7px 14px;border-radius:10px;font-weight:900;font-size:12px}

/* Podium */
.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;align-items:end;margin:8px 0 16px}
.pod{text-align:center;background:#fff;border-radius:16px 16px 6px 6px;padding:12px 8px 10px;box-shadow:var(--shadow-sm);position:relative}
.pod .crown{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:22px}
.pod-1{background:linear-gradient(180deg,#fff5dc,#fff);padding-top:18px}
.pod .pod-avatar{width:46px;height:46px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:18px;box-shadow:var(--shadow-sm)}
.pod-1 .pod-avatar{width:58px;height:58px;font-size:22px}
.pod .pod-name{font-size:12px;font-weight:800;line-height:1.2}
.pod .pod-pts{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}

/* HUISWERK card */
.hw{background:#fff;border-radius:16px;padding:14px;box-shadow:var(--shadow-sm);margin-bottom:10px;border-left:4px solid var(--gold)}
.hw .hw-head{display:flex;justify-content:space-between;align-items:start;gap:10px;margin-bottom:6px}
.hw .hw-due{font-size:11px;color:var(--orange);font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.hw .hw-title{font-weight:900;font-size:15px;margin-bottom:2px}
.hw .hw-desc{font-size:13px;color:var(--muted);font-weight:700;line-height:1.4}
.hw .hw-meta{display:flex;align-items:center;gap:8px;margin-top:8px}
.hw .check{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff}
.hw .check.done{background:var(--green);border-color:var(--green);color:#fff;font-weight:900;font-size:14px}

/* MESSAGE */
.msg-row{background:#fff;border-radius:14px;padding:14px;box-shadow:var(--shadow-sm);margin-bottom:10px;cursor:pointer;display:flex;gap:12px;align-items:start}
.msg-row.unread{border-left:4px solid var(--green)}
.msg-row.unread .msg-from{color:var(--green)}
.msg-row .msg-from{font-weight:900;font-size:14px}
.msg-row .msg-when{font-size:11px;color:var(--muted);font-weight:700}
.msg-row .msg-preview{font-size:13px;color:var(--muted);font-weight:700;line-height:1.4;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.msg-row .badge-dot{width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:auto;flex-shrink:0;margin-top:6px}

/* MESSAGE THREAD */
.thread{display:flex;flex-direction:column;gap:10px;padding:10px 0}
.bubble{padding:10px 14px;border-radius:18px;max-width:80%;font-size:14px;font-weight:600;line-height:1.4;box-shadow:var(--shadow-sm)}
.bubble.them{background:#fff;align-self:flex-start;border-bottom-left-radius:6px}
.bubble.me{background:var(--green);color:#fff;align-self:flex-end;border-bottom-right-radius:6px}
.bubble .when{display:block;font-size:10px;font-weight:700;opacity:.6;margin-top:3px}
.compose{position:absolute;bottom:74px;left:14px;right:14px;background:#fff;border-radius:18px;padding:6px;box-shadow:var(--shadow);display:flex;gap:6px;align-items:center}
.compose textarea{flex:1;border:0;outline:0;padding:10px 14px;font-size:14px;resize:none;height:38px;background:transparent}
.compose button{background:var(--green);color:#fff;width:38px;height:38px;border-radius:13px;font-weight:900;display:flex;align-items:center;justify-content:center}

/* EFENDIJA — aanwezigheid */
.lesson-card{background:linear-gradient(135deg,var(--blue-soft),#fff);border-radius:18px;padding:16px;box-shadow:var(--shadow-sm);margin-bottom:14px}
.lesson-card .lc-date{font-size:11px;color:var(--blue);font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.lesson-card .lc-title{font-size:18px;font-weight:900;margin:2px 0 6px}
.lesson-card .lc-meta{font-size:12px;color:var(--muted);font-weight:700}
.aw-list .aw-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line)}
.aw-list .aw-row:last-child{border:0}
.aw-list{background:#fff;border-radius:16px;box-shadow:var(--shadow-sm);overflow:hidden}
.aw-toggle{margin-left:auto;display:flex;background:#f1f5f9;border-radius:10px;padding:2px}
.aw-toggle button{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:800;color:var(--muted)}
.aw-toggle button.aw{background:var(--green);color:#fff}
.aw-toggle button.az{background:var(--red);color:#fff}

/* BESTUUR — overzicht */
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.metric{background:#fff;border-radius:16px;padding:14px;box-shadow:var(--shadow-sm)}
.metric .m-lbl{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.metric .m-num{font-size:26px;font-weight:900;line-height:1;margin:6px 0 2px}
.metric .m-trend{font-size:11px;font-weight:800}
.metric .m-trend.up{color:var(--green-mid)}
.metric .m-trend.down{color:var(--red)}

.bar{height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden;margin-top:6px}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--green-mid),var(--green));border-radius:4px;transition:.4s}

/* avatars */
.avatar.c0{background:linear-gradient(135deg,#34d399,#10b981)}
.avatar.c1{background:linear-gradient(135deg,#fbbf24,#f59e0b)}
.avatar.c2{background:linear-gradient(135deg,#60a5fa,#3b82f6)}
.avatar.c3{background:linear-gradient(135deg,#f472b6,#ec4899)}
.avatar.c4{background:linear-gradient(135deg,#a78bfa,#8b5cf6)}
.avatar.c5{background:linear-gradient(135deg,#fb923c,#f97316)}

/* ILMIHAL expandable */
.ilm-cat{background:#fff;border-radius:16px;box-shadow:var(--shadow-sm);margin-bottom:10px;overflow:hidden}
.ilm-cat-head{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer}
.ilm-cat-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ilm-cat-info{flex:1;min-width:0}
.ilm-cat-name{font-size:14px;font-weight:800}
.ilm-cat-prog{font-size:11px;color:var(--muted);font-weight:700;margin-top:1px}
.ilm-cat-bar{height:4px;background:var(--line);border-radius:4px;margin-top:5px;overflow:hidden}
.ilm-cat-fill{height:100%;border-radius:4px;transition:.3s}
.ilm-chevron{font-size:16px;color:var(--muted);transition:.2s;flex-shrink:0}
.ilm-cat.open .ilm-chevron{transform:rotate(90deg)}
.ilm-lessons{padding:0 14px 12px;display:none;flex-direction:column;gap:5px}
.ilm-cat.open .ilm-lessons{display:flex}
.ilm-lesson{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:11px;background:var(--bg);cursor:pointer}
.ilm-lesson.done{background:var(--green-soft)}
.ilm-check{width:24px;height:24px;border-radius:50%;border:2.5px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;font-size:12px;font-weight:900}
.ilm-lesson.done .ilm-check{background:var(--green);border-color:var(--green);color:#fff}
.ilm-lesson-name{font-size:12px;font-weight:700;flex:1;line-height:1.3}
.ilm-lesson-pts{font-size:11px;font-weight:800;color:var(--gold);flex-shrink:0}
.ilm-overview{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.ilm-ov-card{background:#fff;border-radius:13px;padding:11px 8px;text-align:center;box-shadow:var(--shadow-sm)}
.ilm-ov-num{font-size:18px;font-weight:900;color:var(--green)}
.ilm-ov-lbl{font-size:10px;color:var(--muted);font-weight:700;margin-top:2px}

/* HEADER role-bar (taal toggle small) */
.role-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#fff;border-radius:0 0 18px 18px;box-shadow:var(--shadow-sm)}
.role-bar .who{font-size:13px;font-weight:800}
.role-bar .who span{color:var(--muted);font-weight:700;margin-left:4px}
.role-bar .lang-toggle{display:flex;gap:4px;background:#f1f5f9;border-radius:10px;padding:2px}
.role-bar .lang-toggle button{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:800;color:var(--muted)}
.role-bar .lang-toggle button.on{background:#fff;color:var(--green);box-shadow:var(--shadow-sm)}

input[type=text],input[type=password],input[type=search]{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-size:14px;outline:0}
input[type=text]:focus{border-color:var(--green)}
input[type=number]{width:100%;padding:10px 12px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-size:14px;outline:0}
select{font-family:inherit;font-weight:600}

@media print {
  body{background:white}
  .frame{padding:0}
  .app{border-radius:0;box-shadow:none;max-width:100%;min-height:auto}
  .nav,.topbar{display:none!important}
  .screen{padding:12px!important}
  #bestuur-dashboard *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  button{display:none!important}
  .bar-fill{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

function ilmStats(level, kidId){
  const cats=ILMIHAL[level]||[];
  const done=(kidId!=null ? state.ilmDone[kidId] : {})||{};
  const totaal=cats.reduce((s,c)=>s+c.lessen.length,0);
  const gedaan=cats.reduce((s,c)=>s+c.lessen.filter(l=>done[l.id]).length,0);
  return{totaal,gedaan,pct:totaal?Math.round(gedaan/totaal*100):0};
}
// Totale ilmihal-score (pts) op basis van afgevinkte lessen door efendija
function ilmPts(kidId){
  const done=state.ilmDone[kidId]||{};
  let total=0;
  Object.keys(ILMIHAL).forEach(lvl=>{
    ILMIHAL[lvl].forEach(cat=>{ cat.lessen.forEach(les=>{ if(done[les.id]) total+=les.pts; }); });
  });
  return total;
}

// Per-kind stations: PATH = label/icon/pts template, kid.stationData = echte status per kind
function kidStations(k, cat, lvl){
  const template = (PATH[cat]&&PATH[cat][lvl]) || [];
  const saved = k && k.stationData && k.stationData[cat] && k.stationData[cat][lvl];
  return template.map((s,i)=>{
    if(saved && saved[i]) return {...s, status:saved[i].status, tag:saved[i].tag||undefined};
    return {...s};
  });
}

      </div>
      <div class="keypad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="key" onclick="tapKey('${n}')">${n}</button>`).join('')}
        <button class="key fn" onclick="state.selectedPerson=null;state.pin='';render()">${T('back')}</button>
        <button class="key" onclick="tapKey('0')">0</button>
        <button class="key fn" onclick="tapKey('back')">⌫</button>
      </div>
      <div style="margin-top:12px;font-size:11px;color:var(--muted)">PIN: ${p.pin}</div>
    </div>
  </div>`;
}

function tapKey(k){
  if(k==='back'){ state.pin=state.pin.slice(0,-1); render(); return; }
  if(state.pin.length>=4) return;
  state.pin += k; render();
  if(state.pin.length===4){
    setTimeout(()=>{
      if(state.pin===state.selectedPerson.pin){
        state.me = state.selectedPerson;
        state.view = 'app'; state.nav='home'; state.pin='';
        if(state.role==='kind') state.pathLevel = state.me.level;
        render();
      } else {
        document.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('error'));
        setTimeout(()=>{ state.pin=''; render(); }, 450);
      }
    }, 120);
  }
}

function kidLeader(){
  const k = state.me;
  const tab = state.leaderTab || 'myLevel';

  // Rangschik op basis van actieve tab
  let ranked;
  if(tab==='streakTop'){
    ranked = [...KIDS].sort((a,b)=>b.streak-a.streak).map((kk,i)=>({...kk, _rank:i+1}));
  } else if(tab==='hafizTop'){
    ranked = [...KIDS].sort((a,b)=>b.pts-a.pts).map((kk,i)=>({...kk, _rank:i+1}));
  } else {
    // myLevel: kids van hetzelfde niveau, gesorteerd op pts
    const sameLevel = [...KIDS].filter(kk=>kk.level===k.level).sort((a,b)=>b.pts-a.pts).map((kk,i)=>({...kk, _rank:i+1}));
    const others = [...KIDS].filter(kk=>kk.level!==k.level).sort((a,b)=>b.pts-a.pts).map((kk,i)=>({...kk, _rank:sameLevel.length+i+1}));
    ranked = [...sameLevel, ...others];
  }

  // Podium: top 3 van de gesorteerde lijst (alleen als er ≥3 kids zijn)
  const podiumKids = ranked.slice(0, Math.min(3, ranked.length));
  const podiumOrder = podiumKids.length>=3 ? [podiumKids[1], podiumKids[0], podiumKids[2]] : podiumKids;
  const podiumPos   = podiumKids.length>=3 ? [2,1,3] : [1,2,3];
  const sortVal = tab==='streakTop' ? (kk=>kk.streak+'w 🔥') : (kk=>kk.pts+' pt');

  return `<div class="topbar">
      <button class="back-btn" onclick="setNav('home')">←</button>
      <div style="text-align:center;flex:1"><div style="font-weight:900">${T('tabLeader')}</div><div class="muted" style="font-size:12px">${T('podiumSub')}</div></div>

        <div class="subtab ${tab==='streakTop'?'on':''}" onclick="state.leaderTab='streakTop';render()">🔥 ${T('streakTop')}</div>
      </div>
      ${podiumKids.length>=2 ? `<div class="podium">
        ${podiumOrder.map((kk,i)=>{
          const pos=podiumPos[i];
          return `<div class="pod ${pos===1?'pod-1':''}">
            ${pos===1?'<div class="crown">👑</div>':''}
            <div class="pod-avatar ${colorOf(kk.name)}">${initial(kk.name)}</div>
            <div class="pod-name">${kk.name}</div>
            <div class="pod-pts">${sortVal(kk)}</div>
          </div>`;
        }).join('')}
      </div>` : ''}
      <div class="list">
        ${ranked.map(kk=>`
          <div class="list-row ${kk.id===k.id?'me':''}">
            <div class="rank ${kk._rank<=3?'r'+kk._rank:''}">${kk._rank}</div>
            <div class="avatar sm ${colorOf(kk.name)}">${initial(kk.name)}</div>
            <div class="name">${kk.name}<div style="font-size:11px;font-weight:700;color:var(--muted)">N${computedLevel(kk)} • 🔥${kk.streak}w</div></div>
            <div class="pts">${tab==='streakTop'?kk.streak+'<span style="font-size:10px">w</span>':kk.pts+'<span style="font-size:10px">pt</span>'}</div>
          </div>`).join('')}
      </div>
    </div>
    ${navBar([['home',T('tabHome')],['path',T('tabPath')],['leader',T('tabLeader')]])}`;
}

let _parentIdCounter = 200;
function addKid(){
  const n = state.newKid;
  if(!n.name.trim() || !n.pin.trim()){ alert(L('Naam en PIN zijn verplicht','Ime i PIN su obavezni')); return; }
  const newId = crypto.randomUUID ? crypto.randomUUID().slice(0,18) : ('k'+Date.now());
  const ouder1 = n.ouder1name.trim();
  const ouder1pin = n.ouder1pin.trim()||n.pin.trim();
  if(ouder1){
    const p1Id = ++_parentIdCounter;
    PARENTS.push({id:p1Id, name:ouder1, pin:ouder1pin, kidIds:[newId]});
  }
  if(n.ouder2name.trim()){
    const p2Id = ++_parentIdCounter;
    PARENTS.push({id:p2Id, name:n.ouder2name.trim(), pin:n.ouder2pin.trim()||n.pin.trim(), kidIds:[newId]});
  }
  const newKid = {id:newId, name:n.name.trim(), level:parseInt(n.level), pin:n.pin.trim(), pts:0, streak:0, rank:KIDS.length+1, sinceYear:new Date().getFullYear(), stationData:{}, ilmDoneData:{}};
  KIDS.push(newKid);
  ATTENDANCE[newId] = WEEKS.map(w=>({date:w, present:false}));
  state.ilmDone[newId] = {};
  state.newKid = {name:'', level:1, pin:'', ouder1name:'', ouder1pin:'', ouder2name:'', ouder2pin:''};
  state.showAddKid = false;
  render();
  saveKidToDB(newId); // async
}
function removeKid(id){
  const k = KIDS.find(x=>x.id===id);
  if(!k) return;
  if(!confirm(L(`${k.name} verwijderen?`,`Obrisati ${k.name}?`))) return;
  KIDS.splice(KIDS.indexOf(k),1);
  delete ATTENDANCE[k.id];
  // Verwijder ook de ouder als die geen andere kinderen meer heeft
  const parentIdx = PARENTS.findIndex(p=>p.kidIds.includes(k.id));
  if(parentIdx!==-1){
    const p = PARENTS[parentIdx];
    p.kidIds = p.kidIds.filter(x=>x!==k.id);
    if(p.kidIds.length===0) PARENTS.splice(parentIdx,1);
  }
  [...KIDS].sort((a,b)=>b.pts-a.pts).forEach((kid,i)=>{ kid.rank=i+1; });
  render();
  DB.from('leerlingen_v5').delete().eq('id', id); // async
}

function niveauCompleted(kidId, lvl){
  const k = KIDS.find(x=>x.id===kidId);
  const suras = k ? kidStations(k,'suras',lvl) : [];
  const allSurasDone = suras.length>0 && suras.every(s=>s.status==='done');
  const ilm = ilmStats(lvl, kidId);
  const allIlmDone = ilm.totaal>0 && ilm.gedaan===ilm.totaal;
  return allSurasDone && allIlmDone;
}

// Auto-berekend niveau op basis van voltooiing — voor weergave (badges, namen)
// N1 totdat N1 volledig af is, dan N2, dan N3
function computedLevel(k){
  if(niveauCompleted(k.id, 1) && niveauCompleted(k.id, 2)) return 3;
  if(niveauCompleted(k.id, 1)) return 2;
  return 1;
}

function levelCelebrationBanner(kidId, lvl){
  if(!niveauCompleted(kidId, lvl)) return '';
  return `<div style="background:linear-gradient(135deg,#fbbf24,#f59e0b);border-radius:20px;padding:16px 18px;margin-bottom:14px;text-align:center;box-shadow:0 8px 24px rgba(251,191,36,.35);animation:pop .4s ease">

    <div style="font-weight:900;font-size:17px;color:#fff;letter-spacing:-.2px">${L('Niveau '+lvl+' voltooid!','Nivo '+lvl+' završen!')}</div>
    <div style="font-size:12px;color:rgba(255,255,255,.88);margin-top:4px;font-weight:700">${L('Alle suras én ilmihal van N'+lvl+' zijn af! Mashallah! 🌟','Sve sure i ilmihal od N'+lvl+' su završeni! Mašallah! 🌟')}</div>
  </div>`;
}

function bestuurHome(){
  const total = KIDS.length;
  const avgAtt = Math.round(KIDS.reduce((s,k)=>{
    const a=ATTENDANCE[k.id]||[]; return s+(a.length?a.filter(w=>w.present).length/a.length:0);
  },0)/Math.max(1,total)*100);
  const avgPts = Math.round(KIDS.reduce((s,k)=>s+k.pts,0)/Math.max(1,total));
  const healthLabel = avgAtt>=85?L('Goed','Dobro'):avgAtt>=70?L('Voldoende','Zadovoljava'):L('Aandacht!','Pažnja!');
  const lastWeekPresent = KIDS.filter(k=>ATTENDANCE[k.id]?.[WEEKS.length-1]?.present).length;
  const hwOpen = HOMEWORK.filter(h=>!h.done).length;

  // VERDELING PER NIVEAU data
  const NIVEAU_COLORS = {1:'#22c55e', 2:'#f97316', 3:'#8b5cf6'};
  const NIVEAU_BG     = {1:'#dcfce7', 2:'#ffedd5', 3:'#f0eaff'};
  const N = [1,2,3].map(lv=>{
    const ks=KIDS.filter(k=>k.level===lv);
    const att=ks.length?Math.round(ks.reduce((s,k)=>{const a=ATTENDANCE[k.id]||[];return s+(a.length?a.filter(w=>w.present).length/a.length:0);},0)/ks.length*100):0;
    return{lv,count:ks.length,att};
  });

  // AANDACHT NODIG — 3+ afwezig
  const aandacht = KIDS.map(k=>{
    const abs=(ATTENDANCE[k.id]||[]).filter(w=>!w.present).length;
    return{k,abs};
  }).filter(x=>x.abs>=3).sort((a,b)=>b.abs-a.abs);

  // TOP LEERLINGEN — top 5 op punten
  const topKids = [...KIDS].sort((a,b)=>b.pts-a.pts).slice(0,5);

  return `${topbarBestuur()}

        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:12px">

            {lbl:L('Leerlingen','Učenici'), val:total, ico:'🎓'},

            {lbl:'Hafiz ⌀', val:avgPts+'pt', ico:'⭐'},
            {lbl:L('HW open','Zadaće'), val:hwOpen, ico:'📝'},
          ].map(m=>`<div style="background:rgba(255,255,255,.18);border-radius:13px;padding:9px 6px;text-align:center;backdrop-filter:blur(4px)">
            <div style="font-size:15px;margin-bottom:2px">${m.ico}</div>
            <div style="font-size:17px;font-weight:900;color:#fff;line-height:1">${m.val}</div>
            <div style="font-size:9px;color:rgba(255,255,255,.8);font-weight:800;margin-top:2px">${m.lbl}</div>

      <div class="card" style="padding:14px 16px;margin-bottom:14px">
        ${N.map(n=>{
          const pct = Math.round(n.count/Math.max(1,total)*100);

              </div>
              <span style="font-weight:900;font-size:13px;color:${n.att>=80?'var(--green)':n.att>=65?'var(--gold)':'var(--red)'}">${n.att}% ${L('aanw.','pris.')}</span>

              <div style="height:100%;width:${pct}%;background:${NIVEAU_COLORS[n.lv]};border-radius:99px;transition:.4s"></div>

        }).join('')}
      </div>

      <!-- AANDACHT NODIG — 3+ keer afwezig -->
      ${aandacht.length?`
      <div class="section-head"><div class="h3">⚠️ ${L('Aandacht nodig','Potrebna pažnja')} <span style="font-size:11px;color:var(--red);font-weight:700">${L('3+ keer afwezig','3+ puta odsutan')}</span></div></div>
      <div class="card" style="padding:0;margin-bottom:14px;overflow:hidden;border:1px solid rgba(239,68,68,.2)">
        ${aandacht.map((x,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:11px 14px${i<aandacht.length-1?';border-bottom:1px solid var(--line)':''}">

            <div style="font-weight:800;font-size:13px">${x.k.name}</div>

          </div>
          <div style="text-align:right">
            <div style="font-weight:900;font-size:13px;color:var(--red)">${x.abs}×</div>
            <div style="font-size:10px;color:var(--muted);font-weight:700">${L('afwezig','odsutan')}</div>
          </div>
        </div>`).join('')}
      </div>`
      :`<div class="card" style="margin-bottom:14px;text-align:center;color:var(--green);font-weight:800;font-size:13px">✅ ${L('Geen leerlingen met 3+ afwezigheden','Nema učenika sa 3+ izostanaka')}</div>`}

      <!-- TOP LEERLINGEN -->
      <div class="section-head"><div class="h3">🏆 ${L('Top leerlingen','Top učenici')}</div></div>
      <div class="card" style="padding:0;margin-bottom:14px;overflow:hidden">

          const att=ATTENDANCE[k.id]||[];
          const attPct=att.length?Math.round(att.filter(w=>w.present).length/att.length*100):0;
          const rankColors=['#f4c430','#b0b8c1','#cd7f32','var(--muted)','var(--muted)'];
          const rankBg=['#fff5dc','#f1f5f9','#fdf0e8','var(--bg)','var(--bg)'];
          return`<div style="display:flex;align-items:center;gap:10px;padding:11px 14px${i<topKids.length-1?';border-bottom:1px solid var(--line)':''}">
            <div style="width:26px;height:26px;border-radius:8px;background:${rankBg[i]};display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:${rankColors[i]};flex-shrink:0">${i+1}</div>
            <div class="avatar sm ${colorOf(k.name)}">${initial(k.name)}</div>

function bestuurAttendance(){
  const total = KIDS.length;
  const lastIdx = WEEKS.length - 1;
  const lastWeekPresent = KIDS.filter(k=>ATTENDANCE[k.id]?.[lastIdx]?.present).length;
  const presentPct = Math.round(lastWeekPresent/Math.max(1,total)*100);

  // Laatste 7 lessen (omgekeerd, nieuwste eerst)
  const weekStats = WEEKS.map((w,i)=>{
    const present=KIDS.filter(k=>ATTENDANCE[k.id]?.[i]?.present).length;
    const pct=Math.round(present/Math.max(1,total)*100);
    const d=new Date(w);
    const lbl=d.toLocaleDateString('nl-NL',{day:'2-digit',month:'2-digit',year:'numeric'});
    return{lbl,present,pct};
  }).reverse().slice(0,7);

  // Per leerling gesorteerd op aanwezigheid %
  const kidStats=[...KIDS].map(k=>{
    const att=ATTENDANCE[k.id]||[];
    const pct=att.length?Math.round(att.filter(w=>w.present).length/att.length*100):0;
    const abs=att.filter(w=>!w.present).length;
    return{k,pct,abs};
  }).sort((a,b)=>b.pct-a.pct);

  return `${topbarBestuur()}
    <div class="screen" style="padding-top:8px;padding-bottom:28px">

      <!-- VANDAAG -->

function ouderRegFormHtml(){
  const r=state.regData;
  const lbl=(nl,bs)=>`<div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:9px 0 5px">${L(nl,bs)}</div>`;

    <div style="font-weight:900;font-size:13px;margin-bottom:4px">👪 ${L('Kind aanmelden','Prijava djeteta')}</div>
    <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:10px">${L('Kies één PIN voor jou én je kind — gebruik dit om in te loggen.','Odaberite jedan PIN za vas i vaše dijete — koristite ga za prijavu.')}</div>
    ${lbl('Jouw naam (ouder)','Vaše ime (roditelj)')}
    <input type="text" placeholder="${L('Naam ouder','Ime roditelja')}" value="${r.ouderNaam}" oninput="state.regData.ouderNaam=this.value" style="margin-bottom:4px;font-size:14px">
    ${lbl('Naam kind','Ime djeteta')}
    <input type="text" placeholder="${L('Voornaam kind','Ime djeteta')}" value="${r.kindNaam}" oninput="state.regData.kindNaam=this.value" style="margin-bottom:4px;font-size:14px">
    ${lbl('Gedeelde PIN (ouder + kind)','Zajednički PIN (roditelj + dijete)')}
    <input type="text" placeholder="${L('4 cijfers — voor ouder én kind','4 cifre — za roditelja i dijete')}" value="${r.ouderPin}" oninput="state.regData.ouderPin=this.value" maxlength="4" style="margin-bottom:12px;font-size:14px">
    <div style="display:flex;gap:8px">
      <button onclick="state.showRegForm=false;render()" style="flex:1;padding:11px;border-radius:12px;border:1.5px solid var(--line);font-weight:800;font-size:13px">${L('Annuleren','Odustani')}</button>
      <button onclick="ouderReg()" style="flex:1;background:var(--green);color:#fff;padding:11px;border-radius:12px;font-weight:800;font-size:13px">${L('Aanmelden','Prijaviti se')}</button>
    </div>
  </div>`;
}
function ouderReg(){
  const r=state.regData;
  if(!r.ouderNaam.trim()||!r.ouderPin.trim()||!r.kindNaam.trim()){ alert(L('Vul naam ouder, naam kind en PIN in.','Unesite ime roditelja, ime djeteta i PIN.')); return; }
  if(r.ouderPin.trim().length<4){ alert(L('PIN moet 4 cijfers zijn.','PIN mora biti 4 cifre.')); return; }
  const newKidId = crypto.randomUUID ? crypto.randomUUID().slice(0,18) : ('k'+Date.now());
  const newParentId=++_parentIdCounter;
  const pin=r.ouderPin.trim();
  const newKid = {id:newKidId, name:r.kindNaam.trim(), level:1, pin, pts:0, streak:0, rank:KIDS.length+1, sinceYear:new Date().getFullYear(), stationData:{}, ilmDoneData:{}};
  KIDS.push(newKid);
  ATTENDANCE[newKidId]=WEEKS.map(w=>({date:w,present:false}));
  state.ilmDone[newKidId]={};
  PARENTS.push({id:newParentId, name:r.ouderNaam.trim(), pin, kidIds:[newKidId]});
  state.regData={ouderNaam:'',ouderPin:'',kindNaam:''};
  state.showRegForm=false;
  render();
  saveKidToDB(newKidId);
  alert(L(`${r.kindNaam} is aangemeld! Log nu in als ouder met PIN ${pin}.`,`${r.kindNaam} je prijavljen/a! Prijavite se kao roditelj s PIN-om ${pin}.`));
}

// Sura/quran station toggle door efendija — per kind opgeslagen in Supabase
// Cyclus: locked → current(NU) → done(✓) → locked → ...
function efToggleSura(kidId, levelId, idx, cat){
  cat = cat || 'suras';
  const k = KIDS.find(x=>x.id===kidId);
  if(!k) return;
  // Initialiseer per-kind stationData als nog niet aanwezig
  if(!k.stationData) k.stationData = {};
  if(!k.stationData[cat]) k.stationData[cat] = {};
  if(!k.stationData[cat][levelId]){
    // Kopieer template als startpunt voor dit kind
    k.stationData[cat][levelId] = (PATH[cat][levelId]||[]).map(s=>({status:s.status, tag:s.tag||null}));
  }
  const s = k.stationData[cat][levelId][idx];
  if(!s) return;
  const was = s.status;
  if(was==='locked')      { s.status='current'; s.tag='NU'; }
  else if(was==='current'){ s.status='done';    s.tag=null; }
  else                    { s.status='locked';  s.tag=null; }
  // Herbereken hafiz pts: gewoon de raw pts van afgevinkte suras optellen (wat je ziet = wat je krijgt)
  if(cat==='suras'){
    let total=0;
    [1,2,3].forEach(lv=>{
      const stations = kidStations(k,'suras',lv);
      total += stations.filter(x=>x.status==='done').reduce((s,x)=>s+(x.pts||0),0);
    });
    k.pts = total;
    [...KIDS].sort((a,b)=>b.pts-a.pts).forEach((kid,i)=>{ kid.rank=i+1; });
  }
  render();
  saveKidToDB(kidId); // async, op achtergrond
}
// Attendance toggle door efendija
function toggleAttendance(kidId, weekIdx){
  if(!ATTENDANCE[kidId]) ATTENDANCE[kidId]=WEEKS.map(w=>({date:w,present:false}));
  ATTENDANCE[kidId][weekIdx].present=!ATTENDANCE[kidId][weekIdx].present;
  const k=KIDS.find(x=>x.id===kidId);
  if(k) k.streak=ATTENDANCE[kidId].filter(w=>w.present).length;
  render();
  saveKidToDB(kidId);
}

// ═══════════════════════════════════════════════════════════════
// SUPABASE DATA — laden en opslaan
// ═══════════════════════════════════════════════════════════════
async function loadData(){
  state.loading = true; render();
  try {
    const {data, error} = await DB.from('leerlingen_v5').select('*').order('rang');
    if(error) throw error;
    KIDS.length=0; PARENTS.length=0; state.ilmDone={};
    let pIdCtr=1000;
    data.forEach(row=>{
      const kid = {
        id: row.id, name: row.naam, level: row.niveau, pin: row.pin,
        pts: row.punten||0, streak: row.streak||0, rank: row.rang||1,
        sinceYear: row.since_year||2026,
        stationData: row.suras||{},
        ilmDoneData: row.ilmihal||{},
      };
      KIDS.push(kid);
      state.ilmDone[row.id] = row.ilmihal||{};
      // Aanwezigheid normaliseren naar {date, present}
      const att = Array.isArray(row.aanwezigheid) ? row.aanwezigheid.map(a=>({
        date: a.date||a.datum||'', present: a.present!==undefined ? a.present : (a.aanwezig||false)
      })) : [];
      // Zorg dat alle WEEKS vertegenwoordigd zijn
      const attDates = new Set(att.map(a=>a.date));
      WEEKS.forEach(w=>{ if(!attDates.has(w)) att.push({date:w, present:false}); });
      att.sort((a,b)=>a.date.localeCompare(b.date));
      ATTENDANCE[row.id] = att;
      // Ouder opbouwen vanuit ouder_naam/ouder_pin
      if(row.ouder_naam){
        const ex = PARENTS.find(p=>p.name===row.ouder_naam && p.pin===row.ouder_pin);
        if(ex) ex.kidIds.push(row.id);
        else PARENTS.push({id:++pIdCtr, name:row.ouder_naam, pin:row.ouder_pin||row.pin, kidIds:[row.id]});
      }
    });
    [...KIDS].sort((a,b)=>b.pts-a.pts).forEach((k,i)=>k.rank=i+1);
  } catch(e){ console.error('DB fout bij laden:', e); }
  state.loading = false; render();
}

async function saveKidToDB(kidId){
  const k = KIDS.find(x=>x.id===kidId);
  if(!k) return;
  const p = PARENTS.find(p=>p.kidIds.includes(kidId));
  const att = (ATTENDANCE[kidId]||[]).map(a=>({date:a.date, present:a.present}));
  try {
    await DB.from('leerlingen_v5').upsert({
      id: k.id, naam: k.name, niveau: k.level, pin: k.pin,
      punten: k.pts||0, streak: k.streak||0, rang: k.rank||1,
      suras: k.stationData||{},
      ilmihal: state.ilmDone[k.id]||{},
      aanwezigheid: att,
      ouder_naam: p ? p.name : '',
      ouder_pin:  p ? p.pin  : '',
      since_year: k.sinceYear||2026,
    });
  } catch(e){ console.error('DB fout bij opslaan:', e); }
}

// Naam bewerken — efendija
function saveKidName(kidId){
  const input=document.getElementById('edit-kid-name');
  if(!input) return;
  const val=input.value.trim();
  if(!val){ alert(L('Naam mag niet leeg zijn.','Ime ne može biti prazno.')); return; }
  const k=KIDS.find(x=>x.id===kidId);
  if(k){ k.name=val; render(); saveKidToDB(kidId); }
}
function saveParentName(parentId){
  const input=document.getElementById('edit-parent-name-'+parentId);
  if(!input) return;
  const val=input.value.trim();
  if(!val){ alert(L('Naam mag niet leeg zijn.','Ime ne može biti prazno.')); return; }
  const p=PARENTS.find(x=>x.id===parentId);
  if(p){
    p.name=val;
    // Sla op voor alle kinderen van deze ouder
    p.kidIds.forEach(kid=>saveKidToDB(kid));
    render();
  }
}

loadData(); // haalt data op uit Supabase en roept daarna render() aan
